body:
  text: 畫禪室隨筆卷二明董其昌撰畫訣士人作畫當以草𨽻竒字之法為之樹如屈鉄山似畫沙絶去甜俗蹊徑乃為士氣不爾縱儼然及格已落畫師魔界不復可救藥矣若能解脱䋲束中便是透網鱗也畫家六法一氣韵生動氣韵不可學此生而知之自有天授然亦有學得處讀萬卷書行萬里路胸中脱去塵濁自然丘壑内營立成鄞鄂隨手寫出皆為山水傳神矣李成惜墨如金王洽潑墨瀋成畫夫學畫者每念惜墨潑墨四字于六法三品思過半矣古人論畫有云下筆便有凹凸之形此最縣解吾以此悟高出厯代處雖不能至庶幾效之得其百一便足自老以㳺丘壑間矣氣霽地表雲斂天末洞庭始波禾葉微脱春草碧色春水緑波送君南浦傷如之何四更山吐月殘夜水明樓海風吹不斷江月照還空宋畫院各有試目思陵嘗自出新意以品畫師余欲以此數則徵名手圖小景然少陵無人謫仙死文沈之後廣陵散絶矣奈何潘子輩學余畫視余更工然皴法三昧不可與語也畫有六法若其氣韵必在生知轉工轉逺畫中山水位置皴法皆各有門庭不可相通惟樹木則不然雖李成董源范寛郭熈趙大年趙千里馬夏李唐上自荆闗下逮黄子久吳仲圭輩皆可通用也或曰須自成一家此殊不然如桞則趙千里松則馬和之枯樹則李成此千古不易雖復變之不離本源豈有舍古法而獨創者乎倪雲林亦出自郭熈李成稍加柔雋耳如趙文敏則極得此意蓋萃古人之美于樹木不在石上着力而石自秀潤矣今欲重臨古人樹木一册以為奚囊古人畫不從一邊生去今則失此意故無八靣玲瓏之巧但能分能合而皴法足以發之是了手時事也其次須明虚實實者各段中用筆之詳略也有詳處必要有略處實虚互用踈則不深䆳宻則不風韵但審虚實以意取之畫自竒矣凡畫山水須明分合分筆乃大綱宗也有一幅之分有一段之分于此了然則畫道過半矣樹頭要轉而枝不可繁枝頭要斂不可放樹梢要放不可緊畫樹之法須專以轉折為主每一動筆便想轉折處如寫字之于轉筆用力更不可徃而不收樹有四肢謂四面皆可作枝着葉也但畫一尺樹更不可令有半寸之直須筆筆轉去此秘訣也畫須先工樹木但四靣有枝為難耳山不必多以簡為貴作雲林畫須用側筆有輕有重不得用圓筆其佳處在筆法秀峭耳宋人院體皆用圓皴北苑獨稍縱故為一小變倪雲林黄子久王叔明皆從北苑起祖故皆有側筆雲林其尤著者也北苑畫小樹不先作樹枝及根但以筆㸃成形畫山即用畫樹之皴此人所不知乃訣法也北苑畫雜樹但只露根而以㸃葉高下肥瘦取其成形此即米畫之祖最為高雅不在斤斤細巧畫人物須顧盼語言花果迎風帶露禽飛獸走精神脱真山水林泉清閒幽曠屋廬深邃橋渡徃來山脚入水澄明水源來厯分曉有此數端即不知名定是高手董北苑畫樹多有不作小樹者如秋山行旅是也又有作小樹但只逺望之似樹其寔憑㸃綴以成形者余謂此即米氏落茄之源委蓋小樹最要淋漓約略簡于枝柯而繁于形影欲如文君之眉與黛色相叅合則是高手古人云有筆有墨筆墨二字人多不識畫豈有無筆墨者但有輪廓而無皴法即謂之無筆有皴法而不分輕重向背明晦即謂之無墨古人云石分三靣此語是筆亦是墨可叅之畫家以古人為師已自上乗進此當以天地為師毎朝起看雲氣變幻絶近畫中山山行時見竒樹須四靣取之樹有左看不入畫而右看入畫者前後亦爾看得熟自然傳神傳神者必以形形與心手相凑而相忘神之所托也樹豈有不入畫者特當收之生綃中茂宻而不繁峭秀而不蹇即是一家眷屬耳畫樹木各有分别如畫瀟湘圖意在荒逺滅沒即當作大樹及近景叢木如園亭景可作楊栁梧竹及古檜青松若以園亭樹木移之山居便不稱矣若重山複嶂樹木又别當直枝直幹多用攅㸃彼此相藉望之糢糊鬱葱似入林有猿啼虎嘷者乃稱至如春夏秋冬風晴雨雪又不在言也枯樹最不可少時于茂林中間出乃竒古茂樹惟檜栢楊桞椿槐要鬱森其妙處在樹頭與四靣參差一出一入一肥一瘦處古人以木炭畫圏隨圏而㸃之正為此也栁宋人多高垂栁又有㸃葉栁垂栁不難畫只要分枝頭得勢耳㸃栁葉之妙在樹頭圓鋪處只以汁緑漬出又要森蕭有迎風揺颺之意其枝須半明半暗又春二月栁未垂條秋九月栁已衰颯俱不可混設色亦須體此意也山之輪廓先定然後皴之今人從碎處積為大山此最是病古人運大軸只三四大分合所以成章雖其中細碎處多要之取勢為主吾有元人論米高二家山書正先得吾意畫樹之竅只在多曲雖一枝一節無有可直者其向背俯仰全于曲中取之或曰然則諸家不有直樹乎曰樹雖直而生枝發節處必不都直也董北苑樹作勁挺之狀特曲處簡耳李營丘則千屈萬曲無復直筆矣畫家之妙全在烟雲變滅中米虎兒謂王維畫見之最多皆如刻畫不足學也惟以雲山為墨戱此語雖似過正然山水中當着意烟雲不可用鈎染當以墨漬出令如氣蒸冉冉欲墮乃可稱生動之韵趙大年畫平逺絶似右丞秀潤天成真宋之士夫畫此一𣲖又傳為倪雲林雲林工緻不敵而荒率蒼古勝矣今作平逺及扇頭小景一以此二人為宗使人玩之不窮味外有味可也畫平逺師趙大年重山叠嶂師江貫道皴法用董源麻皮皴及瀟湘圖㸃子皴樹用北苑子昻二家法石法用大李將軍秋江待渡圖及郭忠恕雪景李成畫法有小幀水墨及着色青緑俱宜宗之集其大成自出機軸再四五年文沈二君不能獨歩吾吳矣作畫凡山俱要有凹凸之形先鈎山外勢形像其中則用直皴此子久法也畫與字各有門庭字可生畫不可熟字須熟後生畫須生外熟畫源吾家有董源龍㝛郊民圖不知所取何義大都簞壺迎師之意蓋宋藝祖下江南時所進御者畫甚竒名則諂矣董北苑蜀江圖瀟湘圖皆在吾家筆法如出二手又所藏北苑畫數幀無復同者可稱畫中龍張擇端清明上河圖皆南宋時追摹汴京景物有西方美人之思筆法纎細亦近李昭道惜骨力乏耳王叔明為趙吳興甥其畫皆摹唐宋高品若董巨李范王維備能似之若于刻畫之工元季當為第一髙彦敬尚書畫在逸品之列雖學米氏父子乃逺宗吾家北苑而降格為墨戯者倪迂在勝國時以詩畫名世其自標置不在黄公望王叔明間自云我此畫深得荆闗遺意非王蒙輩所能夢見也然定其品當稱逸格蓋米襄陽趙大年一𣲖耳于黄王真伯仲不虛也畫譜不載司馬君實予曾見其畫大類營丘有小米作一幀配之宋人題欵甚多因思古人自不可盡其伎倆元季四大家以黄公望為冠而王蒙倪瓉吳仲圭與之對壘此數公評畫竟以高彦敬配趙文敏恐非偶也余藏北苑一卷諦審之有二姝及鼓瑟吹笙者有漁人布網漉魚者乃瀟湘圖也蓋取洞庭張樂地瀟湘帝子逰二語為境耳余亦嘗逰瀟湘道上山川竒秀大都如此圖而是時方見李伯時瀟湘卷曾效之作一小幀今見北苑乃知伯時雖名宗所乏蒼莽之氣耳石田春山欲雨圖卷向藏王元美家今歸余處春郊牧馬圖或曰趙王孫子昻或云仲穆余定以為五代人筆王右丞畫余從檇李項氏見釣雪圖盈尺而已絶無皴法石田所謂筆意凌兢人局脊者最後得小幀乃趙吳興所藏頗類營丘而高簡過之又于長安楊高郵所得山居圖則筆法類大年有宣和題危樓日暮人千里欹枕秋風鴈一聲者然總不如馮祭酒江山雪霽圖具有右丞妙趣予曾借觀經歳今如漁父出桃源矣倪雲林生平不畫人物惟龍門僧一幀有之亦罕用圖書惟荆蠻民一印者其畫遂名荆蠻民今藏余家霅有華溪勝國時人多寫華溪漁隱蓋是趙承㫖倡之王叔明是趙家甥故亦作數幀今皆為余所藏余每欲買山霅上作桃源人以應畫䜟丁酉三月十五日余與仲醇在吳門韓宗伯家其子古周携示余顔書自身告徐季海書朱巨川告即海岳書史所載皆是雙璧又趙千里三生圖周文矩文㑹圖李龍眠白蓮社圖惟顧愷之作右軍家園景直酒肆上人耳項又新家趙千里四大幀千里二字金書余與仲醇諦審之乃顔秋月筆也黄子久畫以余所見不下三十幀要之浮巒暖翠為第一恨景碎耳趙文敏洞庭兩山二十幀各題以騷語四句全學董源為余家所藏郭忠恕越王宫殿向為嚴分宜物後籍沒朱節菴國公以折俸得之流傳至余處其長有三尺餘皆沒骨山也余細撿乃畫錢鏐越王宫非勾踐也李成晴巒蕭寺文三橋售之項子京大青綠全法王維今歸余處細視之名董羽也吳琚晉陵人書學米南宫可以奪真今北固天下第一江山題榜是其跡也所著有雲壑集余在京師見宋人挂幀絶類南宫但有雲壑印遂定為琚筆題尾數行使琚不冺沒也仲醇絶好瓉畫以為在子久山樵之上余為寫雲林山景一幀歸之題云仲醇悠悠忽忽土木形骸似嵇叔夜近代唯懶瓉得其半耳云云政是識韵人了不可得余長安時寄仲醇書云所欲學者荆闗董巨李成此五家畫尤少真蹟南方宋畫不堪賞鑒兄等為訪之作一銘心記如宋人者俟弟書成與合一本即不能收藏聊以適意不令海岳獨行畫史也京師楊太和家所藏唐晉以來名蹟甚佳余借觀有右丞畫一幀宋徽廟御題左方筆勢飄舉真竒物也撿宣和畫譜此為山居圖察其圖中松針石脉無宋以後人法定為摩詰無疑向相傳為大李將軍而拈出為輞川者自余始余家所藏北苑畫有瀟湘圖商人圖秋山行旅圖又二圖不著其名一從白下徐國公家購之一則金吾鄭君與余博古懸北苑于堂中兼以倪黄諸蹟無復于北苑著眼者政自不知元人來處耳李伯時西園雅集圖有兩本一作于元豐間王晉卿都尉之第一作于元祐初安定郡王趙徳麟之邸余從長安買得團扇上者米襄陽細楷不知何本又别見仇英所摹文休承䟦後者余買龔氏江貫道江山不盡圖法董巨是綃素其卷約有二三丈後有周宻林希逸䟦貫道負茶癖葉少藴常薦之故周䟦云恨不乞石林見也文人之畫自王右丞始其後董源僧巨然李成范寛為嫡子李龍眠王晉卿米南宫及虎兒皆從董巨得來直至元四大家黄子久王叔明倪元鎮吳仲圭皆其正傳吾朝文沈則又遥接衣鉢若馬夏及李唐劉松年又是李大將軍之派非吾曹易學也禪家有南北二宗唐時始分畫之南北二宗亦唐時分也但其人非南北耳北宗則李思訓父子着色山流傳而為宋之趙幹趙伯駒伯驌以至馬夏輩南宗則王摩詰始用渲淡一變鈎斫之法其傳為張璪荆闗郭忠恕董巨米家父子以至元之四大家亦如六祖之後有馬駒雲門臨濟兒孫之盛而北宗微矣要之摩詰所謂雲峰石迹逈出天機筆意縱横叅乎造化者東坡賛吳道子王維畫壁亦云吾于維也無間然知言哉元季諸君子畫惟兩派一為董源一為李成成畫有郭河陽為之佐亦猶源畫有僧巨然副之也然黄倪吳王四大家皆以董巨起家成名至今隻行海内至如學李郭者朱澤民唐子華姚彦卿輩俱為前人蹊徑所壓不能自立堂户此如南宗子孫臨濟獨盛當亦紹隆祖法者有精靈男子耶畫無筆迹非謂其墨淡糢糊而無分曉也正如善書者藏筆鋒如錐畫沙印印泥耳書之藏鋒在于執筆沈着痛快人能知善書執筆之法則能知名畫無筆迹之説故古人如大令今人如米元章趙子昻善書必能善畫善畫必能善書其實一事耳余嘗謂右軍父子之書至齊梁而風流頓盡自唐初虞禇輩變其法乃不合而合右軍父子殆似復生此言大可意會蓋臨摹最易神氣難傳故也巨然學北苑黄子久學北苑倪迂學北苑學一北苑耳而各各不相似使俗人為之與臨本同若爾何能傳世也子昻畫雖圓筆其學北苑亦不爾雲林山皆依側邊起勢不用兩邊合成此人所不曉近來俗子㸃筆便自稱米家山深可笑也元暉睥睨千古不讓右丞可容易凑泊開後人䕶短逕路耶荆浩河南人自號洪谷子博雅好古以山水專門頗得趨向善為雲中山頂四靣峻厚自撰山水訣一卷語人曰道子畫山水有筆而無墨項容有墨而無筆浩兼二子所長故闗仝北靣事之世論荆浩山水為唐末之冠蓋有筆無墨者見落筆蹊徑而少自然有墨無筆者去斧鑿㾗而多變態米家山謂之士夫畫元人有畫論一卷專辨米海岳高房山異同余頗有慨其語迂翁畫在勝國時可稱逸品昔人以逸品置神品之上厯代唯張志和盧鴻可無愧色宋人中米襄陽在蹊逕之外餘皆從陶鑄而來元之能者雖多然承禀宋法稍加蕭散耳吳仲圭大有神氣黄子久特妙風格王叔明奄有前規而三家皆有縱横習氣獨雲林古淡天然米癡後一人而已趙榮禄枯樹法郭熈李成不知實從飛白結字中來也文君眉峰㸃黛不知從董雙成逺山蛾帶來也知此省畫法古人逺矣曺不興吳道子近世人耳猶不復見一筆况顧陸之徒其可得見之哉是故論畫當以目見者為準若逺指古人曰此顧也此陸也不獨欺人寔自欺耳故言山水則當以李成范寛花果則趙昌王友花竹翎毛則徐熈黄筌崔順之馬則韓幹伯時牛則厲范二道士仙佛則孫太古神怪則石恪猫犬則何尊師周炤得此數家已稱竒妙士大夫家或有收其妙迹者便已千金矣何必逺求太古之上耳目之所不及者哉范寛山川渾厚有河朔氣象瑞雪滿山動有千里之逺寒林孤秀挺然自立物態嚴凝儼然三冬在目營丘作山水危峰奮起蔚然天成喬木倚磴下自成隂軒暢閒雅悠然逺眺道路深窈儼若深居用墨頗濃而皴斮分曉凝坐觀之雲烟忽生澄江萬里神變萬狀予嘗見一雙幅每對之不知身在千巗萬壑中趙集賢畫為元人冠冕獨推重高彦敬如後生事名㝛而倪迂題黄子久畫云雖不能夢見房山特有筆思則高尚書之品幾與吳興埒矣高乃一生學米有不及無過也張伯雨題元鎮畫云無畫史縱横習氣余家有六幀又其自題獅子圖云予與趙君美長商㩁作獅子圖真得荆闗遺意非王蒙輩所能夢見也其高自標置如此又顧謹中題倪畫云初以董源為宗及乎晚年畫益精詣而書法漫矣蓋倪迂書絶工緻晚年乃失之而聚精于畫一變古法以天真幽淡為宗要亦所謂漸老漸熟者若不從北苑築基不容易到耳縱横習氣即黄子久未能斷幽淡兩言則趙吳興猶遜迂翁其胸次自别也趙大年平逺寫湖天𣺌茫之景極不俗然不耐多皴雖云學維而維畫正有細皴者乃于重山叠嶂有之趙未能盡其法也李昭道一派為趙伯駒伯驌精工之極又有士氣後人仿之者得其工不得其雅若元之丁野夫錢舜舉是已蓋五百年而有仇實父在昔文太史亟相推服太史于此一家畫不能不遜仇氏故非以賞譽増價也實父作畫時耳不聞鼔吹駢闐之聲如隔壁釵釧戒顧其術亦近苦矣行年五十方知此一派畫殊不可習譬之禪定積刼方成菩薩非如董巨米三家可一超直入如來地也元季四大家浙人居其三王叔明湖州人黄子久衢州人吳仲圭錢塘人惟倪元鎮無錫人耳江山靈氣盛衰故有時國朝名手僅僅戴進為武林人已有浙派之目不知趙吳興亦浙人苦浙派日就澌滅不當以甜邪俗頼者盡系之彼中也昔人評大年畫謂得胸中萬卷書更竒又大年以宗室不得逺㳺每朝陵囬得寫胸中丘壑不行萬里路不讀萬卷書欲作畫祖其可得乎此在吾曺勉之無望庸史矣畫之道所謂宇宙在乎手者眼前無非生機故其人徃徃多夀至如刻畫細謹為造物役者乃能損夀蓋無生機也黄子久沈石田文徵仲皆大耋仇英短命趙吳興止六十餘仇與趙雖品格不同皆習者之流非以畫為寄以畫為樂者也寄樂于畫自黄公望始開此門庭耳余少學子久山水中復去而為宋人畫今間一倣子久亦差近之日臨樹一二株石山土坡隨意皴染五十後大成猶未能作人物舟車屋宇以為一恨喜有元鎮在前為我䕶短不者百喙莫解矣董北苑瀟湘圖江貫道江居圖趙大年夏山圖黄大癡富春山圖董北苑征商圖雲山圖秋山行旅圖郭忠恕輞川招隱圖范寛雪山圖輞川山居圖趙子昻洞庭二圖高山流水圖李營丘着色山圖米元章雲山圖巨然山水圖李將軍蜀江圖大李將軍秋江待渡圖宋元人册葉十八幅右俱吾齋神交師友每有所如携以自隨則米家書畫船不足羡矣題自畫倣米畫題米元章作畫一正畫家謬習觀其高自標置謂無一㸃吳生習氣又云王維之跡殆如刻畫真可一笑蓋唐人畫法至宋乃暢至米又一變耳余雅不學米畫恐流入率易茲一戱仿之猶不敢失董巨意善學下惠頗不能當也倣烟江疊嶂圖右東坡先生題王晉卿畫晉卿亦有和歌語特竒麗東坡為再和之意當時晉卿必自畫二三本不獨為王定國藏也今皆不傳亦無復摹本在人間雖王元美所自題家藏烟江圖亦自以為與詩意無取知非真矣余從嘉禾項氏見晉卿瀛山圖筆法似李營丘而設色似思訓脱去畫史習氣惜項氏本不戒于火已歸天上晉卿跡遂同廣陵散矣今為想像其意作烟江疊嶂圖于時秋也輒臨秋景于所謂春風揺江天漠漠等語存而弗論矣倣米家雲山題董北苑僧巨然都以墨流雲氣有吐吞變㓕之勢米氏父子宗董巨法稍刪其䋣複獨畫雲仍用李將軍鉤筆如伯駒伯驌輩欲自成一家不得隨人棄取故也因為此圖及之題畫贈徐道寅余嘗見勝國時推房山鷗波居四家之右而吳興每遇房山畫輒題品作勝語若讓伏不置者顧近代賞鑒家或不謂然此由未見高尚書真跡耳今年六月在吳門得其巨軸雲煙變滅神氣生動果非子久山樵所能夢見因與道寅為别訪之容安草堂出精素求畫畫成此圖即高家法也觀者可意想房山風規于百一乎題畫贈陳眉公予之㳺長沙也徃返五千里雖江山暎發蕩滌塵土而落日空林長風駭浪感行路之艱犯垂堂之戒者數矣古有風不出雨不出三十年不蓄雨具者彼何人哉先是予之逰檇李也為圖崐山讀書小景尋為人奪去及是重仿巨然筆意以志予慕余亦且倒衣從之不作波民老也題董北苑畫朔旦至金閶門客以北苑畫授予雲烟變滅草木鬱葱真駭心動目之觀乃知米氏父子深得其意余家有虎兒大姚村圖政復相類不師北苑烏能夢見南宫耶倣惠崇題惠崇巨然皆高僧逃畫禪者惠以艶冶巨然平澹各有所入而巨然超矣因倣惠崇及之題畫老鶴眠堦初露下高梧滿地忽霜黄余曾作此景以貽仲醇矣清臣復强余為之覺與前幅較勝一籌耳題自畫小景趙令穰伯駒承㫖三家合并雖妍而不甜董源巨然米芾高克恭四家合并雖縱而有法兩家法門如鳥雙翼吾將老焉又陳道醇有宋刻書苑携至煙雨樓予讀次輒有省畫法為寫癡翁筆意又此畫余倣大癡得無余亦癡絶否臨巨然畫題右上元後三日友人以巨然松陰論古圖售于余者余懸之畫禪室合樂以享同觀者復秉燭掃二圖厥明以示客客曰君叅巨公禪幾于一㝛覺矣倣三趙畫題右余家有趙伯駒春山讀書圖趙大年江鄉清夏圖今年長至項晦甫以子昻鵲華秋色卷見貽余兼採三趙筆意為此圖然趙吳興已兼二子余所學則吳興為多也題張清臣集扇靣册余所畫扇頭小景無慮百數皆一時酬應之筆趙子輩亦有仿為之者徃徃亂真清臣此册結集多種皆出余手且或善者庶足供吟賞人人如此具眼余可不辨矣題鶴林春社圖贈唐公有家有獨鶴忽迷所如人失人得已類楚弓自去自來莫期梁燕已乃于唐公之牆復躡羽人之跡整翮返駕引吭長鳴似深惜别之情聊作思歸之曲嗚呼雀羅閴若鷗盟眇然顧此仙禽真吾徳友驚蓬超忽仍聨支遁之交珠樹玲瓏不逐浮丘之路雖云合有㝠數亦由去無遐心自此可以蹔㳺萬里等狎雞羣守養千齡無虞鳥散者矣欲志黄庭之報遂寫青田之真載綴短章用存嘉話題横雲秋霽圖與朱敬韜此倣倪高士筆也雲林畫法大都樹木似營丘寒林山石宗闗仝叅以北苑而各有變局學古人不能變便是籬堵間物去之轉逺乃由絶似耳横雲山吾郡名勝本陸士龍故居今敬韜搆草舎其下敬韜韵致書畫皆類倪高士故余用倪法作圖贈之書小赤壁并題吾郡九峰之間有小赤壁余頃過齊安至赤壁其高僅數仞廣容兩亭耳吾郡赤壁乃三四倍之山靈負屈莫為解嘲昔齊安名人鹵莽如是因畫赤壁一正向來之謬然予以是并疑吾郡有小崐山未知去抵鵲村路幾許使余得鑿空㳺之或亦如小赤壁不須多遜也雲海三神山圖李思訓寫海外山董源寫江南山米元暉寫南徐山李唐寫中州山馬逺夏圭寫錢塘山趙吳興寫霅苕山黄子久寫海虞山若夫方壺蓬閬必有羽人傳照余以意為之未知似否江山秋思圖余與平原程黄門以使事過江南一日閣輿道上陂陀迴複峰巒孤秀下有平湖碧澄萬頃湖之外長江吞山征帆㸃㸃與鳥俱沒黄門曰此何山也余曰其齊山乎蓋以江涵秋影句測之果然雲林圖元季四大家獨倪雲林品格尤超蚤年學董源晚乃自成一家以簡淡為之余嘗見其自題獅子林圖曰此卷深得荆闗遺意非王蒙諸人所夢見也其高自標許如此豈意三百年後有余旦暮遇之乎濠梁秋思圖城隅綠水明秋日海上青山隔暮雲吾郡龍潭夜泛身在太白詩中不作柴桑濠濮間想語矣煙江叠嶂圖雲山不始于米元章蓋自唐時王洽潑墨便已有其意董北苑好作煙景煙雲變沒即米畫也余于米芾瀟湘白雲圖悟墨戱三昧故以寫楚山題天池石壁圖畫家初以古人為師後以造物為師吾見黄子久天池圖皆贋本昨年㳺吳中山䇿笻石壁下快心洞目狂叫曰黄石公同㳺者不測余曰今日遇吾師耳幽亭秀木圖幽亭秀木古人嘗繪圖世無解其意者余為下註脚曰亭下無俗物謂之幽木不臃腫經霜變紅黄者謂之秀昌黎云坐茂樹以終日當作嘉樹則四時皆宜霜松雪竹雖凝寒亦自堪對孤烟逺村圖山下孤烟逺村天邊獨樹高原非右丞工于畫道不能得此語米元暉猶謂右丞畫如刻畫故余以米家山寫其詩倣叔明畫題王叔明畫從趙文敏風韵中來故酷似其舅又汎濫唐宋諸名家而以董源王維為宗故其縱逸多姿又徃徃出文敏規格之外若使叔明專門師文敏未必不為文敏所掩也因畫叔明筆意及之題畫贈俞君寳俞君寳將遊武夷索余此圖若有好事者能為君寳生兩翼便以贈之畫在余腕不至如子瞻斷臂也臨郭恕先畫并題輞川招隱圖為郭恕先筆余得之長安周生今年復于吳門見郭河陽臨本乃易雪景為設色山矣河陽筆力已自小减矧余野戰之師何敢言奪趙幟耶寫寒林逺岫圖并題昔人評王右丞畫以為雲峰石色逈出天機筆思縱横叅乎造化余未之見也徃在京華聞馮開之得一圖于金陵走使緘書借觀既至凡三薫三沐乃長跽開卷經歳開之復索還一似漁郎出桃花源再徃迷誤悵惘久之不知何時重得路也因想像為寒林逺岫圖世有見右丞畫者或不至河漢題秋林圖畫秋景惟楚客宋玉最工寥慄兮若在逺行登山臨水兮送將歸無一語及秋而難状之景都在語外唐人極力摹寫猶是子瞻所謂寫畫論形似作詩必此詩者耳韋蘇州落葉滿空山王右丞渡頭餘落日差足嗣響因畫秋林及之䟦仲方雲卿畫傳稱西蜀黄筌畫兼衆體之妙名走一時而江南徐熈後出作水墨畫神氣若湧别有生意筌恐其軋已稍有瑕疵至于張僧繇畫閻立本以為虛得名固知古今相傾不獨文人爾爾吾郡顧仲方莫雲卿二君皆工山水畫仲方專門名家蓋已有歳矣雲卿一出而南北頓漸遂分二宗然雲卿題仲方小景目以神逸乃仲方向余斂袵雲卿畫不置有如其以詩詞相標譽者俯仰間見二君意氣可薄古人耳題畫贈朱敬韜宋迪侍郎燕肅尚書馬和之米元暉皆禮部侍郎此宋時士大夫之能畫者元時惟趙文敏高彦敬餘皆隱于山林稱逸士今世所傳戴沈文仇頗近勝國窮而後工不獨詩道矣予有意為簮裾樹幟然還山以來稍有爛漫天真似得丘壑之助者因知時代使然不似宋世士大夫之昌其畫也因作秋山圖識之楚中題畫寄眉公武陵公署旁午日撿宋人事因寫圖而系以其詩武陵為五溪馬伏波所謂五溪何毒淫鳥飛不度獸不敢侵者至今笛聲悲怨計余去故園五千里矣頗憶作少游何能聼車生耳哉此詩此畫于余情有當也題谿山别業畫自義陽至大石天池山水間探厯閲兩月都未曾作畫今日目眚初佳梁谿有客携巨然圖見示乗興為此吳絹如水恨手澁不稱耳自作小幀因題倪黄合作予所見三幀獨楊太守家藏為最特為倣之題畫贈君䇿余旣為君策作畸墅詩復作此補圖然畫中剰水殘山不能盡畸墅之勝命之曰廬山讀書圖云題山莊清夏圖小莊清夏三商而起撿所藏法書名畫鑒閱一過極人間清曠之樂作此圖以記事倣趙令穰村居圖壬寅六月七日過嘉興魚江中寫所見之景却似重逰也題倣巨然筆元正十九日為余攬揆之辰海上客携巨然松亭雲岫圖見示真快心洞目之觀戲為倣此松岡逺岫為何司理題右丞田園樂有萋萋春草秋緑落落長松夏寒余採其意為此圖贈士抑兄亦聞士抑有髙卧不出超然人外之意不媿右丞此語耳又題晴嵐蕭寺此圖為仲醇作今入士抑手仲醇曰弟子失之先生得之亦復何憾余曰陳仲子失之何第五得之不亦風流勝㑹乎因題數語以識歳月倣大癡畫贈朱敬韜詩在大癡畫前畫在大癡詩後恰好百四十年翻身出世作怪此沈啓南自題畫余謬書之必有見而大笑之者壬子十月廿四江山秋思圖杜樊川詩時堪入畫南陵水靣漫悠悠風緊雲輕欲變秋正是客心孤逈處誰家紅袖倚高樓陸瑾趙千里皆圖之余家有吳興小册故臨于此題畫贈何士抑士抑兄每望余不為作畫所得余幅輒贋者余以行役久廢此道撿笥中舊時㸃染三尺山自武夷寄之評舊畫題曺雲西畫吾鄉畫家元時有曺雲西張以文張子正諸人皆名筆而曺為最高與黄子久倪元鎮頡頏並重曺本師馮覲郭熈此幀則倣巨然尤異平時之作藏此以存故鄉前輩風流以文畫乃有絶肖大癡者予得之長安今合此乃雙美也題沈石田臨倪畫石田先生于勝國諸賢名蹟無不摹寫亦絶相似或出其上獨倪迂一種淡墨自謂難學蓋先生老筆宻思于元鎮若淡若踈者異趣耳獨此幀蕭散秀潤最為逼真亦平生得意筆也題沈啓南畫册寫生與山水不能兼長惟黄要叔能之余所藏勘書圖學李昇金盤鵓鴿學周昉皆有奪藍之手我朝則沈啓南一人而已此册寫生更勝山水間有本色然皆真虎也題孫漢陽畫石卷唐李徳裕採天下恠石聚之平泉别墅遺誡後昆曰有以平泉石輕予人者非佳子弟也内一醒酒石尤珍愛之醉則踞焉今漢陽之寳七石似不少遜而石疑較勝唐詩云寒姿數片竒突兀曾作秋江秋水骨又云雪盡身還瘦雲生勢不孤此頗足以狀石題顧仲方山水册米元章論畫曰紙千年而神去絹八百年而神去非篤論也神猶火也火無新故神何去來大都世近則托形以傳世逺則托聲以傳耳曺弗興衛恊輩妙迹永絶獨名稱至今則千載以上有耳而目之者矣薛稷之鶴曺覇之馬王宰之山水故擅國能即不擅國能而有甫之詩歌在自足千古雖謂紙素之夀夀于金石可也神安得去乎君畫初學馬文壁後出入黄子久王叔明倪元鎮吳仲圭無不肖似而世好其為子久者題周山人畫余少喜繪業皆從元四大家結緣後入長安與南北宋五代以前諸家血戰正如禪僧作宣律師耳此册檇李周逸之所勒欲與閣帖共傳其志良苦解脱禪固無藉此然學欲望見古人門庭蹊逕斯亦渡河寳筏珍重珍重題趙文敏畫子昻嘗有創為即工者題畫卷有曰予嘗畫馬未嘗畫羊子中强余為此不知合作否此卷特為精妙故知氣韵必在生知非虛也題畫牡丹花品從衆香國中來臨風獨笑足令姚魏氣短便有羣芳競妒其亦自絶題伯玉畫册勝國時畫道獨盛于越中若趙吳興黄鶴山樵吳仲圭黄子久其尤卓然者至于今乃有浙畫之目鈍滯山川不少邇來又復矯而事吳裝亦文沈之賸馥耳伯玉此册行筆破墨種種自超可謂剗俗之雅故當名家伯玉寒士然從項氏兄弟逰多見項子京所藏名畫遂爾有得吾友某某特好之題濟川圖卷後邑侯濟川沈公以循良為江南冠冕鳴琴之暇好奬進文學知名士于是某某以感徳殉知之意屬郡中名手共繪濟川圖贈侯余轉觀之近于唐人所賦南川秔稻花侵縣西嶺雲霞色滿堂者而青雀淩波與海鷗相狎則清溪之政似之圖名濟川以此若余當于侯應召時寫乗長風破萬里巨浪之語為濟川境也某志之題孫漢陽卷右録米元章一帖觀此知米薛相易事誠有之鉄圍叢譚或傳訛耳然余又于宋光禄家得米元章所畫研山雲根雪浪直鑿混沌吾鄉雪居先生又圖為卷可與元章競爽余將以米畫贈之惟欲易東臯草堂前一片烟霞便意足也題漁樂圖宋時名手如巨然李范諸公皆有漁樂圖此起于烟波釣徒張志和蓋顔魯公贈志和詩而志和自為畫此唐勝事後人蒙之多寓意漁隱耳元季尤多蓋四大家皆在江南葭菼間習知漁釣之趣故也題畫南陵水靣詩意江南顧大中嘗于南陵逃捕舫子上畫杜樊川詩意時大中未知名人莫加重後為過客竊去乃共嘆惋予曾見文徵仲畫此詩意題曰吾家有趙榮祿倣趙伯駒小幀畫妙絶間一摹之殊愧不似今予不復見徴仲筆去二趙可知矣題畫七夕泊舟吳閶張慕江以畫售于余有梅花道人大軸倣巨然水墨淋漓雲烟吞吐與巨然不復甲乙又高克恭雲山秋霽與謝伯誠學董源廬山觀瀑圖皆竒筆也題莫秋水畫莫廷韓為宋光禄作此圖在己夘之秋時余同觀咄咄稱賞今已二十年事矣仲文愛之䕶惜特甚自蘇過松周撿襲藏備至不忍轉入它氏手亦交誼也題朱雲來畫敬韜作米虎兒墨戲不减高尚書閱此欲焚吾硯題倪雲林畫雲林畫江東人以有無論清俗余所藏秋林圖有詩云雲開見山髙木落知風勁亭下不逢人夕陽澹秋影其韵致超絶當在子久山樵之上論畫元時畫道最盛惟董巨獨行此外皆宗郭熈其有名者曺雲西唐子華姚彦卿朱澤民輩出其十不能當黄倪一蓋風尚使然亦由趙文敏提醒品格眼目皆正耳余非不好元季四家畫者直泝其源委歸之董巨亦頗為時人換眼丁南羽以為畫道一變畫禪室隨筆卷二
