body:
  text: 畫禪室隨筆卷三明董其昌撰記事豫在廣陵見司馬端明畫山水細巧之極絶似李成多宋元人題跋畫譜俱不載以此知古人之逃名今年遊白下見褚遂良西升經結搆遒徑于黃庭像贊外别有筆思以顧虎頭洛神圖易之不得更償之二百金竟靳固不出登舟作數日惡憶念不置然筆法尚可摹擬遂書此論亦十得二三耳使西升經便落豫手未必追想若此也送君者望崖而返君自此逺宋子京讀莊子至此遂欲沾巾豫北上泊寒山為送别諸君子拈之鬪鵪鶉江南有此戲皆在籠中近有吳門人始開籠于屋除中相鬬彌日復入籠飲啄亦太平清事余與仲醇以建子之月發春申之浦去家百里泛宅淹旬隨風東西與雲朝暮集不請之友乘不繫之舟壺觴對飲翰墨間作吳苑酹真娘之墓荆蠻尋懶瓉之踪固已胸吞具區目瞪雲漢矣夫老至則衰倘來若寄既悟炊粱之夢可虛秉燭之遊居則一丘一壑唯求羊是羣出則千峰萬峰與汗漫為侣茲豫兩人敦此夙好耳余游閩中遇異人談攝生竒訣在讀黃庭內篇夜觀五藏神知其虛實以為補瀉蓋道藏所不傳然須斷葷酒與溫柔鄉則可受持至今愧其語也七夕王太守禹聲招飲于其家園園即文恪所投老唐子畏郝元敬諸公為之㸃綴者是日出其先世所藏名畫有趙千里後赤壁賦一軸趙文敏落花遊魚圖溪山仙館圖又老米雲山倪雲林漁莊秋霽梅道人漁家樂手卷李成雲林卷皆希代寶也余持節楚藩歸曾晚泊祭風臺即周郎赤壁在嘉魚縣南七十里雨過輒有箭鏃于沙渚間出里人拾鏃視豫請以試之火能傷人是當時毒藥所造耳子瞻賦赤壁在黃州非古赤壁也壬辰五月元李氏有古紙長二丈許光潤細膩相傳四世請文敏書文敏不敢落筆但題其尾至文徵仲止押字一行耳不知何時乃得書之余頃驅車彭城不勝足音之懷又有火雲之苦回馭谷水塔上養疴三月而仲醇挾所藏木癭爐王右軍月半帖真蹟吳道子觀音變相圖宋板華嚴經尊宿語録視余文室中惟置一牀相對而坐了不蓄筆研既雨窗靜閴吳門孫叔達以畫事屬余紀遊遂為寫迂翁筆意即長安游子能有此適否袁尚書婦無裩孫女以餓縊死尚書善噉不能饜每市蜆為晚餐可竟一斗有一門生餽以十金輒作三封以一封置袖中乘月叩窮交之户呼與偕步以袖中金贈之而别其貧都由此然每攜醜伎泛泊一日不能廢也楊尚書成在吳中負物望其家不貧而吳中人稱之不在袁公下以其淳謹安靜故令人無可閒然耳尚書過蔡經舊里曰此宋之大賊乃居此乎以為蔡京也所謂不讀非聖書者耶張東海題詩金山西飛白日忙于我南去青山冷笑人有一名公見而物色之曰此當為海內名士東海在當時以氣節重其書學懷素名動四裔自吳中書家後出聲價稍减然行書尤佳今見者少耳余與程黃門同行江南一日閣輿道上見陂陀回復峰巒孤秀外長江吞山征帆㸃㸃與鳥俱沒黃門曰此何山也余曰齊山也黃門曰子何以知之余曰吾知杜樊川所謂江涵秋影者耳詢之舟人亦不能名但曰此上有翠微亭黃門與余一笑而出是日步平堤六七里皆在南湖中此堤之勝西湖僅可北靣稱臣耳俗諺云九子可望不可登齊山可登不可望信然大林寺在天池之西有西竺娑羅樹二株中宴坐老僧余訪之能念阿彌陀佛號而已白樂天詩云人間四月芳菲盡山寺桃花始盛開必此寺也記遊武彛有大王峰峰極尊勝故名武彛君為魏王子騫曾㑹羣真于此奏人間可袁之曲大田縣有七巖臨水山下皆平田秋氣未深樹雕葉落衰桞依依洞天岩在沙縣之西十里其山壁立多松樟上有長耳佛像水旱禱著靈跡其巖寬可容三几二榻高三仞餘滴水不絶閩人未之賞也余創見而深索之得宋人題字石刻十餘處皆南渡以後名手岩下有流觴曲水徐令與余飲竟日頗盡此幽致追寫此景以當紀游高郵夜泊望隔堤大湖月色微晦以為地也至詰旦水也竺典化城無乃是耶豫行至滕陽嶧山在望火雲烟沙殆不復有濟勝具是日宿縣中官舍乃以意造為嶧山不必類嶧山也想當然耳曾遊嶧山者知余不欺人吕梁縣瀑三千仞石骨出水上憶豫童子時父老猶道之今不復爾東海揚塵殆非妄語評詩大都詩以山川為境山川亦以詩為境名山遇賦客何異士遇知己一入品題情貌都盡後之遊者不待按諸圖經詢諸樵牧望而可舉其名矣嗟嗟澄江淨如練齊魯青未了寥落片言遂關千古登臨之口豈獨勿作常語哉以其取境真也象先荆南集不盡象先才之變而余嘗持節長沙自洞庭而下漢陽而上與象先共之故其取境之真特有賞㑹云抑余不能遊然好詩象先能詩又好遊是安得象先為東西南北之人窮夫所謂州有九嶽有五者而皆被以竒音雋響余得隱几而讀之以吾拙而收象先之巧以吾目而用象先之足不大愈快哉東坡云詩人有寫物之工桑之未落其葉沃若他木不可以當此林逋梅花詩踈影橫斜水清淺暗香浮動月黃昏決非桃李詩皮日休白蓮詩無情有恨何人見月冷風清欲墮時此必非紅蓮詩裴璘詠白牡丹詩長安豪貴惜春殘爭賞先開紫牡丹别有玉杯承露冷無人起就月中看余以丙申秋奉使長沙至東林寺時白蓮盛開土人云此晉慧逺所種自晉至今千餘年惟存古甃與欄楯而蓮無復種矣忽放白毫光三日三夜此花窣地而出皆作千葉不成蓮房余徘徊久之幸此花開與余行㑹逺公有記云花若開吾再來余故有詩云泉歸虎溪靜雲度鴈天輕苔蘚封碑古優曇應記生記此事也古人詩語之妙有不可與册子參者惟當境方知之長沙兩岸皆山余以牙檣遊行其中望之地皆作金色因憶水碧沙明之語又自嶽州順流而下絶無高山至九江則匡廬突兀出檣帆外因憶孟襄陽所謂挂席幾千里名山都未逢泊舟潯陽郭始見香爐峰真人語千載不可復值也宋人推廣山谷所得深于子瞻曰山谷真涅槃堂裏禪也頃見岱志詩賦六本讀之既盡為區撿討用孺言曰總不如一句撿討請之曰齊魯青未了燈影照無睡心清聞妙香杜少陵宿招提絶調也豫書此于長安僧舍自後無復敢題詩者萬事不如杯在手一年幾見月當頭文徴仲嘗寫此詩意又樊川翁南陵水靣漫悠悠風緊雲輕欲變秋趙千里亦圖之此皆詩中畫故足畫耳風靜夜潮滿城高寒月昏秋色明海縣寒烟生里閭春盡草木變雨餘池館青楚國橙橘暗吳門烟雨愁郭外秋聲急城邊月色殘衆山遙對酒孤嶼共題詩氣蒸雲夢澤波撼嶽陽城林花掃更落徑草踏還生挂席樵風便開尊琴月孤落日池上酌清風松下來王江寧孟襄陽五言詩句每一詠之便習習生風余見倪雲林自題畫云十月江南未隕霜青楓欲赤碧梧黃停橈坐對寒山晚新雁題詩小著行明月照積雪大江流日夜客心悲未央澄江淨如練玉繩低建章池塘生春草秋菊有佳色俱千古竒語不必有所附麗文章妙境即此瞭然齊隋以還神氣都盡矣李獻吉詩如咏月有云光添桂魄十分影寒落江心幾尺潮不見集中自是佳語唐子畏詩有曰杜曲梨花杯上雪灞陵芳草夢中烟又曰秋榜才名標第一春風脂粉醉千場皆學白香山子畏之才何須以解首矜詡其亦唐人所謂今朝浩蕩恩無涯不免器小之誚唐人詩律與書法頗似皆以濃麗為主而古法稍逺矣余每謂晉書無門唐書無態學唐乃能入晉晉詩如其書雖陶元亮之古淡阮嗣宗之俊爽在法書中未可當虞褚以其無門也因寫唐人詩及之翰墨之事良工苦心未嘗敢以耗氣應也其尤精者或以醉或以夢或以病逰戲神通無所不可何必神怡氣王造物乃完哉世傳張旭號草聖飲酒數斗以頭濡墨縱書壁上凄風急雨觀者歎愕王子安為文每磨墨數升蒙被而卧熟睡而起詞不加㸃若有鬼神此皆得之筆墨蹊徑之外者今觀察王先生當人日病不起據枕作詩二十章言言皆樂府鼓吹也乃與彼二子鼎足立矣東坡讀金陵懷古詞于壁間知為介甫所作嘆曰老狐精能許以羈怨之士終不能損價于論文所謂文章天下至公當其不合父不能諛子其論之定者雖東坡無如荆公何太白曰崔灝題詩在上頭東坡題廬山瀑布曰不與徐凝洗惡詩太白閣筆于崔灝東坡操戈于徐凝豈有恩怨哉評文東坡水月之喻蓋自肇論得之所謂不遷義也文人冥搜內典往往如鑿空不知乃沙門輩家常飯耳大藏教若演之有許大文字東坡突過昌黎歐陽以其多助有此一竒也蘇子瞻表忠觀碑惟叙蜀漢抗衡不服而錢氏順命自見此以賓形主法也執管者即已遊于其中自不明了耳如能了之則拍拍成令雖文采不章而機鋒自契文章隨題敷衍開口即涸須于言盡語竭之時别行一路太史公荆軻傳方叙荆軻刺秦王至秦王環柱而走所謂言盡語竭忽用三個字轉云而秦法自此三字以下又生出多少煙波几作文原是虛架子如棚中傀儡抽牽由人非一定死煞真有一篇文字有代當時作者之口寫他意中事乃謂注于不涸之原且如莊子逍遙篇鷽鳩笑大鵬須代他說曰我決起而飛槍枋時則不至而控于地而已矣奚以之九萬里而南為此非代乎若不代只說鷽鳩笑亦足矣又如太史公稱燕將得魯仲連書云欲歸燕已有隙恐誅欲降齊所殺虜于齊甚衆恐已降而后見辱喟然嘆曰與人辨我寧自辨此非代乎文有翻意者翻公案意也老吏舞文出入人罪雖一成之案能翻駁之文章家得之則光景日新且如馬嵬驛詩凡萬首皆刺明皇寵貴妃只有工拙耳最後一人乃云尚是聖明天子事景陽宫井又何人便翻盡從來窠臼曺孟德疑塜七十二古人有詩云直須發盡疑塜七十二已自翻矣後人又云以操之奸安知不慮及于是七十二塜必無真骨此又翻也青烏家專重脫卸所謂急脈緩受緩脉急受文章亦然勢緩處須急做不令扯長冷淡勢急處須緩做務令紆徐曲折勿得埋頭勿得直腳杜子美云擒賊先擒王凡文章必有真種子擒得真種子則所謂口口咬著又所謂㸃㸃滴滴雨都落在學士眼裡文字最忌排行貴在錯綜其勢散能合之合能散之左氏晉語云賈誼政事疏太子之善在于早諭教與選左右早諭教選左右是兩事他却能以二事雖作兩段全不排比自六朝以後皆畫段為文少此氣味矣作文要得解悟時文不在學只在悟平日須體認一畨才有妙悟妙悟只在題目腔子裏思之思之不已鬼神將通之到此將通時才喚做解悟了解時只用信手拈來頭頭是道自是文中有神動人心竅理義原悅人心我合著他自是合著人心文要得神氣且試看死人活人生花剪花活雞木雞若何形狀若何神氣識得真勘得破可與論文如閲時義閲時令吾毛竦色動便是他神氣逼人處閲時似然似不然欲丢欲不丢欲讀又不喜讀便是他神索處故窗稿不如考卷之神考卷之神薄不如墨卷之神厚魁之神露不如元之神藏試之自有解入處脫奪去陳乃文家之要訣是以剖洗磨煉至精光透露豈率爾而為之哉必非初學可到且定一取捨取人所未用之辭捨人所已用之辭取人所未談之理捨人所已談之理取人所未布之格捨人所已布之格取其新捨其舊不廢辭却不用陳辭不越理却不用皮膚理不異格却不用卑瑣格得此思過半矣文家要養精神人一身只靠這精神幹事精神不旺昏沉到老只是這個人須要養起精神戒浩飲浩飲傷神戒貪色貪色滅神戒厚味厚味昏神戒飽食飽食悶神戒多動多動亂神戒多言多言損神戒多憂多憂鬱神戒多思多思撓神戒久睡久睡倦神戒久讀久讀苦神人若調養得精神完固不怕文字解悟無神氣自是矢口動人此是舉業最上一乘多少伶俐漢只被那卑瑣局曲情態擔閣一生若要做個出頭人直須放開此心令之至虛若天空若海濶又令之極樂若曾㸃遊春若茂叔觀蓮灑灑落落一切過去相見在相未來相絶不罣念到大有入處便是擔當宇宙的人何論雕蟲末技甚矣捨法之難也兩壘相薄兩雄相持而俠徒劍客獨以魚腸匕首成功于枕席之上則孫吳不足道矣此捨法喻也又喻之于禪達摩西來一門超出而億劫修持三千相彈指了之舌頭坐斷文家三昧寧越此哉然不能盡法而遽事捨法則為不及法何士抑能盡其法者也故其遊戲跳躍無不是法意象有神規模絶迹今而後以此爭長海內海內益尊士抑矣吾嘗謂成𢎞大家與王唐諸公輩假令今日而在必不為當日之文苐其一種真血脉如堪輿家所謂正龍有不隨時受變者其竒取之于機其正取之于理其致取之于情其實取之于事其藻取之于辭何謂辭文選是也何謂事左史是也何謂情詩騷是也何謂理論語是也何謂機易是也易闡造化之機故半明半晦以無方為神論語著倫常之理故明白正大以易知為用如論語曰無適無莫何等平易易則曰見羣龍無首下語險絶矣此則王唐諸公之材料窟宅也如能熟讀妙悟自然出言吐氣有典有則而豪少年佻舉浮俗之習淘洗到盡矣夫士子以干祿故不能迂其途以就先民矩矱是或一說矣不曰去其太甚乎小講入題欲離欲合一口說盡難復更端不可稍加虛融乎股法所貴矯健不測今一股之中更加復句轉接之㾗盡露森秀之勢何來不可稍加裁剪乎古文只宜暗用乃得一成語不問文勢夷險必委曲納之或泛而無當或竒而無偶不可稍割愛乎每題目必有提綱既欲運思于題中又欲回盼于題外若復快意直前為題所縛圓動之處了不關心縱才藻燦然終成下格不可另著眼乎諸如此類更僕莫數一隅反之思過半矣畫禪室隨筆卷三
