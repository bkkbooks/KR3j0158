body:
  text: 畫禪室隨筆卷四明董其昌撰雜言上以蹊徑之怪竒論則畫不如山水以筆墨之精妙論則山水决不如畫子美論畫殊有竒㫖如云簡易高人意尤得畫髓昌信卿言大竹畫形小竹畫意虛室生白吉祥止止予最愛斯語凢人居處潔浄無塵溷則神明來宅掃地焚香蕭然清逺即妄心亦自消磨古人于散亂時且整頓書几故自有意長生必可學第不能遇至人授真訣即得訣未必能守之終身予初信此道已讀禪家書有悟入遂不復留情有詩曰未死先教死一塲非七真不解此語也沈明逺畫魚不㸃雙睛嘗戲詫人曰若㸃當化龍去有一童子拈筆試㸃沈叱之魚已躍去矣欲詰童子失其所在鯉魚躍龍門必雷神與燒其尾迺得成龍李思訓畫一魚甫完未施藻荇之類有客叩門出看尋入失去畫魚童子覔之乃風吹入池水拾視之惟空紙耳後嘗戲畫數魚投池内經日夜終不去嘉興有濟舟和尚蚤歳不曾識字因口授禮觀音文經三歳忽發智慧于内外典豁然通曉腹為篋笥辯若懸河晉陵唐應徳時就訪之與談濓洛闗閩之學尤似夙悟大士㝠加顯被之力不可誣也濟有語録行于世因書此文志之南京有顧寳幢居士精修净土每言曰塵勞中隨處下手生死上不必留情又向觀禪師曰閻浮界中心行為重皆有道者之言寳幢亦善畫余于焦弱侯處見之蓋師董北苑閻頭陀者不知其年每似六七十許人坐赤日中卧氷雪路吐語洒然似有得者黄大癡九十而貌如童顔米友仁八十餘神明不衰無疾而逝蓋畫中烟雲供養也大波般若經六百卷此為經之心般若有兩種所謂觀照般若須文字般若中入亦觀音圓通所云此方真教體清净在音聞也余書此經欲使觀音皆觀自在耳般若經六百卷此為經之心猶云般若心也今以心經連讀失其義矣般若有三有觀照般若有實相般若有文字般若文字亦能熏識趣無上菩提故書此流布世間使展卷者信受誦讀種善知見所謂一句染神厯刦不變也士君子貴多讀異書多見異人然非曰宗一先生之言索隱行怪為也村農野叟身有至行便是異人方言里語心所了悟便是異書在吾輩自有超識耳姚氏月華筆札之暇時及丹青花卉翎毛世所鮮及嘗為楊生畫芙蓉匹鳥約略濃淡生態逼真然聊復自娱不復多見也王右丞詩云㝛世謬詞客前身應畫師余謂右丞雲峰石迹逈合天機筆思縱横叅乎造化以前安得有此畫師也詩不求工字不竒天真爛漫是吾師東坡先生語也宜其名高一世王烈入太行山忽聞山如雷聲徃視之裂百餘丈一徑中有青泥流出烈取摶之即堅凝氣味如香粳飯杜子美詩云豈無青精飯使我顔色好即此事也􅄞叔夜不逢石髓然已得為形解仙吾輩安得必遇靈藥但此中空洞無塵土腸即終日喫飯坐證真乗矣觀陳希夷于錢若水事則急流勇退亦神仙中人也東坡守汝隂作擇勝亭以帷幕為之世所未見也銘略曰鑿枘交梲合散靡常赤油仰承青幄四張我所欲徃十夫可將與水升降除地布牀又云豈獨臨水無適不臧春朝花郊秋夕月場無脛而趣無翼而翔子由亦云吾兄和仲塞剛立柔視身如傳茍完即休山盤水嬉習氣未瘳豈以吾好而俾民憂潁泉甚清潁谷孔幽風有翠幄雨有赤油匪車匪舟亦可相攸東坡在海外至不容僦僧寮以居而與子過自縛屋三間僅庇眠食嘗行吟草田間有老嫗向之曰内翰一塲富貴却都消也東坡然其言海外歸至陽羡買宅又以還劵不果蓋終其世無一椽視今之士大夫何如邪樂志論固隱淪語然開口便云良田廣宅去東坡逺矣攤燭作畫正如隔簾看月隔水看花意在逺近之間亦文章法也雪江圖如武陵漁父悵然桃源閣下亦曾念之乎湖上兩峰似已興盡惟此結梦為有情癡世有以山水為真畫者何顛倒見也然恐某某亦顛倒見耳顔清臣忠義大節唐代冠冕人以其書傳蔡元長書法似米南宫書以其人掩兩傷雙美在人自擇耳杜子美作八哀詩于李北海云干謁走其門碑板照四裔獨歩四十年風聽九臯唳北海在當時恃文以名後乃為書所掩墨之就試也如吹竽必一一而吹之其既用也如噉蔗窮委而不厭其漸盡也如火銷膏而不知其成功也如春蠶之作絲而歸于烏有然李廷珪以久特聞非尤物也邪物之可傳者若三代之鼎彛籀之鼓干之劍斯之璽何之瓦與夫宋之陶與研皆寄于金玉土石之殊質以存于世而世亦處之于藏與玩之間唯墨不然以速朽之材而當必磨之用其夀乃有消金玉而磷土石者古之作者寂寥短章各言其體王右軍之書經論序讃自為一法其書牋記尺牘又自為一法故評書者比之于龍何獨右軍岣嶁石鼔之旁出而為鐘鼎嶧山鴻都之旁出而為圖印是皆有龍徳焉挈其要領則兵家所謂勢險節短晉人所謂一徃即詣者盡之矣近代唯豐攷功悟此三昧懿卜此卷覃思念年而彚之則先秦兩京之旁支犂然具矣文夀承博士王少微山人而在其不以為枕中之秘也夫有客謂余曰公贋書滿海内世無照魔鏡誰為公辨黎丘余曰宋時李營丘畫絶少真跡人欲作無李論米元章見偽者三百本真者二本安見三百本能掩二本哉余每書輒令族子鎬摹之歳久積成六卷命之曰書種堂帖因為題此雜言下般若如清凉池四面皆可入用人之謂也般若如大火聚四面皆不可入行法之謂也用人欲兼收一門則局行法欲畫一多門則亂氣之守也靜而忽動可以採藥故道言曰一霎火燄飛真人自出現識之行也續而忽斷可以見性故竺典曰狂心未歇歇即菩提俠客為知己者死動于義氣也非是則郭觧之假手何異于豢犬之吠人忠臣以大義㓕親闗于廟社也非是則逄萌之負心何異于哺梟之食母是以君子不受難酬之恩不樹難事之友一人發真魔宫震動諸天欲善人熾盛以摧魔也一人造業地藏愁悲菩薩欲地獄盡空乃自成佛也庶官脩名大臣捐名脩名者心不敢念是非口不敢言利害潜行宻用如龍養珠也捐名者横心之所念而無是非横口之所言而無利害獨徃獨來如龍之行雨也如來説法必先放光非是無以攝迷而入悟也故易曰潜龍勿用祖師印可旋為掃迹非是且將執悟而成迷也故易曰亢龍有悔知潜之勿用則必有激發之大機董公所以説高祖也其説曰名其為賊故師直而為壯知亢之有悔則必有收斂之妙用子房所以招四皓也其説曰難以力爭故功逸而有成甘草非上藥也而參苓以為國老黛赭非殊彩也而丹碧以為前茅今五品散局名位未極纒蓋猶輕有心足以思目足以識口足以辯行足以信者布列數人隨事評定時乎左袒公卿而臺諌不疑其為阿時乎左袒臺諫而公卿不疑其為激國是自定人心自正矣易戒童牛書稱由櫱匹夫匹婦之是非不明其究必有狎大人者愚夫愚婦之是非不明其究必有侮聖人者宋人有言曰清議者國之所以立也重則亟反蔓則難圖矣聖人不為已甚蓋以水清則無魚良師貴行時中蓋以擊蒙則為冦然而國手不以後着為先着庸醫常因愛人而損人是之與非猶禪家之有南北朋黨之有古今也有如毫釐之差而鮮睿照之明則將聼彼之自相混淆而一無所可否乎黒白未剖而主調停之議則將聽彼之自相𤣥黄而兩無所權衡乎孔子作春秋孟子闢楊墨此魯連飛矢而魏勝濟師蓋言斷也張安道歐陽永叔子瞻輩人也子瞻以其譽而重王荆公程伊川子瞻輩人也子瞻亦以其讐而重作家之相讐勝于疇人之相譽何則妒之厲由其知之真也知薛道衡者隋煬也知駱賓王者武后也若乃蚍蜉之撼無損叅天蒼蝇可憎等之飄瓦而已心如畫師想成國土人在醉鄉有千日而不醒者官中之天地也人在夢宅有千載而不寤者名中之天地也闗尹子曰至人不去天地去識獨立不懼惟司馬君實與吾兄弟耳東坡之不容于荆公也昔之君子惟舒是師今之君子惟温是隨吾不能隨耳東坡之不容于温公也具此兩截成一完人兵再鼔而氣不衰金百煉而色益瑩蓋東坡筆鋩之利自竺典中來襟宇之超得了元之力謂其為縱横之學者洛黨之謬談也曾子行恕當無一事忤人而放流之論諄諄癉惡孰知三省者有金剛劍南雍慎言當無一語傷時而羿奡之喻咄咄逼人孰知三緘者之為荼毒鼓蘇門四友惟山谷學不純師東坡視之隱然敵國文章氣節之外戒行精潔平生罪過比于露坐科頭者祗小艶詞耳此真東坡之畏友也其為文倣蘭亭叙題䟦書畫寥落短篇出于劉義慶世説雖偏師取竒皆超出情量動中肯綮而廣川之藻長睿之博頋不無遜席焉亦得坡公薫染力耳當宣和時黨禁蘇黄及其翰墨凢書畫有兩公題䟦者以為不祥之物裁割都盡乃以進御蓋論世者興嗟焉豈知五百年後小璣片玉盡享連城如侍御楊公裒成此帙也耶山谷嘗為子弟言士生于世可百不為惟不可俗俗便不可醫也臨大節而不可奪者不俗也宋人之以為不祥也俗也侍御公之結集也醫俗也世有不俗者定不作書畫觀矣楚中隨筆米元暉作瀟湘白雲圖自題夜雨初霽曉烟欲出其狀若此此卷予從項晦伯購之攜以自隨至洞庭湖舟次斜陽篷底一望空濶長天雲物怪怪竒竒一幅米家墨戲也自此每將暮輒捲簾看畫卷覺所攜米卷為剰物矣湘江上竒雲大似郭河陽雪山其平展沙脚與墨瀋淋漓乃是米家父子耳古人謂郭熈畫石如雲不虛也米元暉又作海嶽庵圖謂于瀟湘得畫景其次則京口諸山與湘山差類今海嶽圖亦在余行笈中元暉未嘗以洞庭北固之江山為獨勝而以其雲物為勝所謂天閑萬馬皆吾師也但不知雲物何心獨于兩地可入畫或以江上諸山所慿空濶四天無遮得窮其朝朝暮暮之變態耳此非靜者何由深解故論書者曰一須人品高豈非以品高則閒靜無他好縈故耶余所居學使者官署正接遼王廢宫徃見彈事有云故相張謀廢遼王宫以廣第宅今按府志遼藩之廢在江陵未相時而廢宫與江陵官沒入廢宅相去逺甚人言其可信哉若將史筆為真事恐有無窮受屈人皆此類也余至衡州欲觀大唐中興頌永州守以墨刻進亦不甚精蓋彼中稱為三絶碑曰元澷郎頌顔平原書并祁陽石為三殊可嗤恨石何足絶也蓋兩公書與文與其人為三絶耳因題詩令守鐫之詩曰澷郎左氏癖魯國羲之鬼千載逺擅塲同時恰對壘有唐九廟隨飛烟一片中興石不毁幾回吹律寒谷春幾度看碑陳跡新遼鶴歸來認城郭杜鵑聲裏含君臣折釵黄絹森光恠舊國江山餘氣槩當時富貴腹劍多異代風流椽筆在書生何負于國哉元祐之籍何當來子瞻飽喫惠州飯涪翁夜上浯谿臺杖藜掃石溪聲咽不禁技癢還留碣清時有味是無能但潄湘流莫饒舌米元暉楚山清曉圖謂楚中宜取湖天空濶之境余行洞庭良然然以簡書刻促翰墨都廢未嘗成一圖也而有以盤礴詆余者余為詩曰拈筆經營輞口居心知餘習未能除莫將枕潄閒家具又入中山篋裏書蓋山中題畫聊以解嘲云頃楚文學張子見訪言彼其之子為屈軼所指非直烟霞罪過余口占二絶示之云􅏃窓聴雨夜迢迢誰遣尊前慰寂寥楚畹衆香都好在天階瑞草不曾彫來雁霜天楚客歸野情祗授薜蘿衣若憐白社酬裴迪可羡朱門薦陸機今年穀日行三山道中夢書韓昌黎送李愿歸盤谷序且題于後曰盤谷唐人名手無書者豈昌黎所云吾文自謂大好人必大笑之耶覺而心異之厥明聞已在彈事中時陳中丞遺書相訊謂不知復詆何語予答之曰昔年以盤礴達聰聼唯作書未及今之罪案當在此耳已而果然昔管寜渡海風濤大作舟人請各通罪過寜曰吾嘗三朝露坐一朝科頭平生罪過其在斯乎予何敢望㓜安而以書畫見詆此為幸矣宋時蘇黄書雖收藏之家輙抵罪何止及身此又非予幸中之幸耶因題六圖曰枕潄閒勲而系之以此庚戍四月之望禪悦華嚴經云一念普觀無量刦無去無來亦無住如是了達三世事超諸方便成十方李長者釋之曰三世古今始終不離于當念當念即永嘉所云一念者靈知之自性也不與衆緣作對名為一念相應惟此一念前後際斷絳縣老人能知四百甲子桃源中人不知有漢晉魏古詩云山中無厯日寒盡不知年但今日不思昨日事安有過去可得㝠心任運尚可想六時不齊之意何况一念相應耶余始叅竹箆子話久未有契一日于舟中卧念香嚴擊竹因縁以手􅀈舟中張布㠶竹瞥然有省自此不疑從前老和尚舌頭千經萬論觸眼穿透是乙酉年五月舟過武塘時也其年秋自金陵下第歸忽現一念三世境界意識不行凡兩日半而復乃知大學所云心不在焉視而不見聽而不聞正是悟境不可作迷解也中庸戒慎乎其所不覩恐懼乎其所不聞既戒懼矣即屬覩聞既不覩聞矣戒懼之所不到猶云觀未發氣象既未發矣何容觀也余于戊子冬與唐元徵袁伯修瞿洞觀吳觀我吳本如蕭𤣥圃同㑹于龍華寺憨山禪師夜談予徵此義瞿着語云沒撈摸處撈摸余不肯其語曰沒撈摸處切忌撈摸又徵鼔中無鐘聲鐘中無鼔響鐘鼔不交叅句句無前後偈瞿曰不礙余亦不肯其語曰不借是夕唐袁諸君子初依法門未能了余此義即憨山禪師亦兩存之不能商量究竟余謂諸公曰請記取此語異時必自有會及袁伯脩見李卓吾後自謂大徹甲午入都與余復為禪悦之㑹時袁氏兄弟蕭𤣥圃王衷白陶周望數相過從余重舉前義伯脩竟猶渣滓余語也李卓吾與余以戊戍春初一見于都門外蘭若中略披數語即許可莫逆以為眼前諸子惟君具正知見某某皆不爾也余至今愧其意云袁伯脩于彌留之際深悔所悟于生死上用不着遂純提念佛徃生經云人死聞一佛名號皆可解脱諸苦伯脩能信得及亦是平生學道之力四大將離能作是觀必非業力所可障覆也邇見袁中郎手摘永明宗鏡録與𠖇樞㑹要較精詳知其眼目不同徃時境界矣陶周望以甲辰冬請告歸余遇之金閶舟中詢其近時所得曰亦尋家耳余曰兄學道有年家豈待尋苐如今日次吳豈不知家在越所謂到家能問程則未耳丁未春兩度作書要余為西湖之㑹有云兄勿以此㑹為易暮年兄弟一失此便不可知蓋至明年而周望竟千古矣其書中語遂成䜟良可慨也達觀禪師初至雲間余時為諸生與㑹于積慶方丈越三日觀師過訪稽首請余為思大禪師大乗止觀序曰王廷尉妙于文章陸宗伯深于禪理合之雙美離之兩傷道人于子有厚望耳余自此始沉酣内典叅䆒宗乗復得宻藏激揚稍有所契後觀師留長安余以書招之曰馬上君子無佛性不如雲水東南接引初機利根紹隆大法自是不復相聞癸邜冬大獄波及觀師搜其書此書不知何在余謂此足以報觀師矣昔人以三轉語報法乳恩有以也曺孝亷視余以所演西國天主教首言利瑪竇年五十餘曰已無五十餘年矣此佛家所謂是日已過命亦隨减無常義耳須知更有不遷義在又須知李長者所云一念三世無去來今吾教中亦云六時不齊生死根斷延促相離彭殤等倫實有此事不得作寓言解也趙州云諸人被十二時辰使老僧使得十二辰惜時又不在言也宋人有十二時中莫欺自己之論此亦吾教中不為時使者帝網重珠徧刹塵都來當念兩言真華嚴論上分明舉五十三叅鈍置人此余讀華嚴合論偈也當念二字即永嘉所云不離當處常湛然覔即知君不可見須覿靣一囘始得地水火風四大和合假生我身四大各離妄身當在何處此圓覺喫緊語然離妄無真真該妄末妄徹真原斬頭覔活無有是處龎居士有家貲百萬皆以擲之湘流曰無累他人也余有偈曰家貲百萬擲湘流太華山邊撒石頭箇是學人真牓様閨中兒女漫悠悠古徳謂閨閣中物捨不得即是禪病閨閣中物即是悟迹如顔子之得一善是也拳拳服膺便是碍膺之物學人死活不得處永明禪師料簡四句謂有禪有净土無禪無净土云云皆勸人脩西方作徃生公據也然脩净土皆以妄想為入門至于心路斷處義味皭然則不能不退轉故有疑城以居之唯宗説俱通行解相應者不妨以祖師心投安養土如智者大師永明夀皆其卓然者也諸禪師六度萬行未高于諸聖唯心地與佛不殊故曰盡大地只當人一隻眼又曰吾此門中唯論見地不論功行所謂一超直入如來地也然普賢行願毘盧法性足目皆具是為圓修不得以修與悟作兩重案也金剛經四無相但我相空則人物夀相皆盡矣永嘉集三料㨂但法身徹則般若解脱皆真矣華嚴六相義但知真如揔相則總别同異成壞皆融矣曺溪四智但悟大圓鏡智則平等觀察所作智皆轉矣孟子之言巧力臨濟之言照用豈有二哉畫禪室隨筆卷四
