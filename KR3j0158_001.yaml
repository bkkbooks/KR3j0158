body:
  text: 畫禪室隨筆卷一明董其昌撰論用筆米海嶽書無垂不縮無徃不收此八字真言無等等呪也然須結字得勢海嶽自謂集古字蓋於結字㝡留意比其晚年始自出新思耳學米書者惟吳琚絶肖黄華樗寮一支半節雖虎兒亦不似也作書所最忌者位置等勻且如一字中須有收有放有精神相挽處王大令之書從無左右並頭者右軍如鳯翥鸞翔似竒反正米元章謂大年千文觀其有偏側之勢出二王外此皆言布置不當平勻當長短錯綜踈宻相間也作書之法在能放縱又能攅促每一字中失此兩竅便如黒夜獨行全是魔道矣余嘗題永師千文後曰作書須提得筆起自為起自為結不可信筆後代人作書皆信筆耳信筆二字最當玩味吾所云須懸腕須正鋒者皆為破信筆之病也東坡書筆俱重落米襄陽謂之畫字此言有信筆處耳筆畫中須直不得輕易偏軟捉筆時須定宗㫖若泛泛塗抹書道不成形像用筆使人望而知其為某書不嫌説定法也作書最要冺沒稜痕不使筆筆在紙素成板刻様東坡詩論書法云天真爛漫是吾師此一句丹髓也書道只在巧妙二字拙則直率而無化境矣顔平原屋漏痕折釵股謂欲藏鋒後人遂以墨猪當之皆成偃筆癡人前不得説夢欲知屋漏痕折釵股於圓熟求之未可朝執筆而暮合轍也藥山看經曰圖取遮眼若汝曺㸔牛皮也須穿今人㸔古帖皆穿牛皮之喻也古人神氣淋漓翰墨間妙處在隨意所如自成體勢故為作者字如算子便不是書謂説定法也予學書三十年悟得書法而不能實證者在自起自倒自收自束處耳過此闗即右軍父子亦無奈何也轉左側右乃右軍字勢所謂跡似奇而反正者世人不能解也書家好觀閣帖此正是病蓋王著輩絶不識晉唐人筆意專得其形故多正局字須竒宕瀟洒時出新致以奇為正不主故常此趙吳興所未嘗夢見者惟米癡能會其趣耳今當以王僧䖍王徽之陶隱居大令帖幾種為宗餘俱不必學古人作書必不作正局蓋以竒為正此趙吳興所以不入晉唐門室也蘭亭非不正其縱宕用筆處無迹可尋若形模相似轉去之逺栁公權云筆正須善學栁下惠者叅之余學書三十年見此意耳字之巧處在用筆尤在用墨然非多見古人真蹟不足與語及此竅也發筆處便要提得筆起不使其自偃乃是千古不傳語蓋用筆之難難在遒勁而遒勁非是怒張木强之謂乃如大力人通身是力倒輙能起此惟禇河南虞永興行書得之須悟後始肯余言也用墨須使有潤不可使其枯燥尤忌穠肥肥則大惡道矣作書須提得筆起不可信筆蓋信筆則其波畫皆無力提得筆起則一轉一束處皆有主宰轉束二字書家妙訣也今人只是筆作主未嘗運筆書楷當以黄庭懷素為宗不可得則宗女史箴行書以米元章顔魯公為宗草以十七帖為宗評法書余十七歳時學書初學顔魯公多寳塔稍去而之鍾王得其皮耳更二十年學宋人乃得其解處文待詔學智永千文盡態極妍則有之得神得髓槩乎其未有聞也嘗見吳興臨智永故當勝趙吳興䟦蘭亭序云與丙舎帖絶相似丙舎乃鍾元常書世所傳者右軍臨本耳東坡先生書深得徐季海骨力此為文湖州洋嶼詩帖余少時學之今猶能寫或微有合處耳米元章嘗奉道君詔作小楷千字欲如黄庭體米自䟦云少學顔行至于小楷了不㽞意蓋宋人書多以平原為宗如山谷東坡是也惟蔡君謨少變耳吾嘗評米書以為宋朝第一畢竟出東坡之上山谷直以品勝然非專門名家也東坡先生書世謂其學徐浩以予觀之乃出于王僧䖍耳但坡云用其結體而中有偃筆又雜以顔平原法故世人不知其所自來即米顛書自率更得之晚年一變有氷寒于水之奇書家未有學古而不變者也楊景度書自顔尚書懷素得筆而溢為竒怪無五代衰苶之氣宋書黄米皆宗之書譜曰旣得平正須追險絶景度之謂也古人論書以章法為一大事蓋所謂行間茂宻是也余見米癡小楷作西園雅集圖記是紈扇其直如弦此必非有象迹乃平日留意章法耳右軍蘭亭叙章法為古今第一其字皆映帶而生或小或大隨手所如皆入法則所以為神品也素師書本畫法類僧巨然巨然為北苑流亞素師則張長史後一人也高閑而下益趨俗怪不復存山隂矩度矣蘭亭出唐名賢手摹各叅襍自家習氣歐之瘦禇之肥于右軍本來面目不無增損政如仁智自生妄見耳此本定從真蹟心眼相印可以稱量諸家稧帖乃神物也晉唐人結字須一一録出時常叅取此最闗要吾鄉陸儼山先生作書雖率爾應酬皆不茍且常曰即此便是寫字時須用敬也吾每服膺斯言而作書不能不揀擇或閒窓㳺戯都有着精神處惟應酬作荅皆率易茍完此㝡是病今後遇筆研便當起矜莊想古人無一筆不怕千載後人指摘故能成名因地不真果招紆曲未有精神不在傳逺而倖能不朽者也吾于書似可直接趙文敏苐少生耳而子昻之熟又不如吾有秀潤之氣惟不能多書以此讓吳興一籌畫則具體而微要亦三百年來一具眼人也吾學書在十七歳時先是吾家仲子伯長名傳緒與余同試于郡郡守江西𠂻洪溪以余書拙置第二自是始發憤臨池矣初師顔平原多寳塔又改學虞永興以為唐書不如晉魏遂倣黄庭經及鍾元常宣示表力命表還示帖丙舎帖凡三年自謂逼古不復以文徴仲祝希喆置之眼角乃于書家之神理實未有入處徒守格轍耳比游嘉興得盡覩項子京家藏真蹟又見右軍官奴帖于金陵方悟從前妄自標許譬如香巖和尚一經洞山問倒願一生做粥飯僧余亦願焚筆研矣然自此漸有小得今將二十七年猶作隨波逐浪書家翰墨小道其難如是何况學道乎吾鄉陸宫詹以書名家雖率爾作應酬字俱不茍且曰即此便是學字何得放過陸公書類趙吳興實從北海入有客每稱公似趙者公曰吾與同學李北海耳吾鄉莫中江方伯書學右軍自謂得之聖教序然與聖教序體小異其沉着逼古處當代名公未能或之先也予每詢其所由公謙遜不肯應及余己夘試留都見王右軍官奴帖真蹟儼然莫公書始知公深于二王其子雲卿亦工書書家有自神其説以右軍感胎仙傳筆法大令得白雲先生口授者此皆妄人附托語天上雖有神僊能知羲獻為誰乎吕純陽書為神仙中表表者今所見若東老詩乃類張長史又云題黄鶴樓似李北海仙書尚以名家為師如此孫䖍禮曰妙擬神仙余謂實過之無不及也昔人以翰墨為不朽事然亦有遇不遇有㝡下㝡傳者有勤一生而學之異世不聞聲響者有為後人相傾餘子悠悠隨巨手譏評以致聲價頓减者有經名人表章一時慕效大擅墨池之譽者此亦有運命存焉總之欲造極處使精神不可磨沒所謂神品以吾神所著故也何獨書道凡事皆爾趙吳興大近唐人蘇長公天骨俊逸是晉宋間䂓格也學書者能辯此方可執筆臨摹否則紙成堆筆成塜終落狐禪耳米元章云吾書無王右軍一㸃俗氣乃其收王畧帖何珍重如是又云見文皇真論使人氣懾不能臨寫真英雄欺人哉然自唐以後未有能過元章書者雖趙文敏亦于元章歎服曰今人去古逺矣余嘗見趙吳興作米書一册在吏部司務蔣行義家頗得襄陽法今海内能為襄陽書者絶少宋時有人以黄素織烏絲界道三丈成卷誡子孫相傳待書足名世者方以請書凡四傳而遇元章元章自任腕有羲之鬼不復讓也明神宗帝天藻飛翔雅好書法每攜獻之鴨頭丸帖虞世南臨樂毅論米芾文賦以自隨予聞之中書舎人趙士禎言如此因攷右軍曾書文賦禇河南亦有臨右軍文賦今可見者趙榮禄書耳以平原爭坐位求蘇米方知其變宋人無不寫爭坐位帖也晉宋人書但以風流勝不為無法而妙處不在法至唐人始專以法為蹊徑而盡態極妍矣昔顔平原鹿脯帖宋時在李觀察士行家今為辰玉所藏爭坐位帖在永興安師文家安氏析居分而為二人多見其前段師文後乃併得之相繼入内府今前段至菩提寺行香止為項徳新所藏東坡作書于卷後餘數尺曰以待五百年後人作䟦其高自標許如此書家以險絶為奇此竅惟魯公楊少師得之趙吳興弗能解也今人眼目為吳興所遮障予得楊公㳺仙詩日益習之唐林緯乾書學顔平原蕭散古淡無虞禇輩妍媚之習五代時少師特近之臨帖如驟遇異人不必相其耳目手足頭面當觀其舉止笑語精神流露處莊子所謂目擊而道存者也大慧禪師論叅禪云譬如有人具萬萬貲吾皆籍沒盡更與索債此語殊類書闗捩子米元章云如撑急水灘船用盡氣力不離故處蓋書家妙在能㑹神在能離所欲離者非歐虞禇薛諸名家伎倆直欲脱去右軍老子習氣所以難耳那比析骨還父析肉還母若别無骨肉説甚虚空粉碎始露全身晉唐以後惟楊凝式解此竅耳趙吳興未夢見在余此語悟之楞嚴八還義明還日月暗還虚空不汝還者非汝而誰然余解此意筆不與意隨也甲寅二月書法雖貴藏鋒然不得以糢糊為藏鋒須有用筆如太阿剸截之意蓋以勁利取勢以虚和取韻顔魯公所謂如印印泥如錐畫沙是也細叅玉潤帖思過半矣宋高宗於書法最深觀其以蘭亭賜太子令寫五百本更換一本即工力可知思陵運筆全自玉潤帖中來學稧帖者叅取栁誠懸書極力變右軍法蓋不欲與稧帖面目相似所謂神奇化為臭腐故離之耳凢人學書以姿態取媚鮮能解此余於虞褚顔歐皆曾仿彿十一自學栁誠懸方悟用筆古淡處自今以徃不得舎栁法而趨右軍也吾松書自陸機陸雲創于右軍之前以後遂不復繼響二沈及張南安陸文裕莫方伯稍振之都不甚傳世為吳中文祝二家所掩耳文祝二家一時之標然欲突過二沈未能也以空踈無實際故余書則并去諸君子而自快不欲争也以待知書者品之此則論雲間書派余性好書而嬾矜莊鮮寫至成篇者然無日不執筆皆縱横斷續無倫次語耳偶以册置案頭遂時為作各體且多録古人雅致語覺向來肆意殊非用敬之道然余不好書名故書中稍有淡意此亦自知之若前人作書不茍且亦不免為名使耳吾書無所不臨仿㝡得意在小楷書而懶于拈筆但以行草行世亦都非作意書第率爾酬應耳若使當其合處便不能追踪晉宋斷不在唐人後乗也䟦自書臨官奴帖後右軍官奴帖事五斗米道上章語也己夘秋余試留都見真蹟蓋唐冷金牋摹者為閣筆不書者三年此帖後歸婁江王元美予于己丑詢之王澹生則已贈新都許少保矣此帖類禊叙因背臨及之臨洛神賦後大令洛神賦真蹟元時猶在趙子昻家今雖宋搨不復見矣今日寫此四行亦唐摹冷金舊蹟余見之檇李項氏遂師其意試朝鮮䑕鬚筆書羅語題尾樂志論與羅氏此篇實山居之人所自寛語余數書之亦如歸來詞以志吾樂耳書樂志論題尾余在梁溪見徐季海書道徳經評者謂子瞻似之非也子瞻多偃筆季海藏鋒正出欲透紙背安得同論此書欲仿之書酒徳頌題尾伯倫善閉闗雖沉湎自有韜世之致故得與嵇阮輩並稱余飲不能三酌而書此頌又自笑也臨顔平原誥書後唐世官誥皆出善書名公之手魯公為禮部尚書猶書朱巨川誥如近世之埋誌非藉手宗匠以為孝慈不足其重盖如此國朝制誥乃使中書舎人為之寫軸而書法一本沈度姜立綱何能傳後予兩掌制詞及先太史誥欲自書之忽有非時之命持節長沙封吉藩頒誥之時王程于邁不獲從魯公自書之例因臨顔帖為之憮然臨顔書後顔清臣書深得蔡中郎石經遺意後之學顔者以觚稜斬截為入門所謂不叅活句者也余此書竊附魯男子學栁下惠之意臨天馬賦書後襄陽書天馬賦余所見已四本一為擘窠大字後題云為平海大師書後園水丘公觀特為雄傑在嘉禾黄履常叅政家一為檢討王履泰藏乃仿顔平原爭坐帖一在吾鄉宋叅政家一在新都吳氏後有黄子久諸元人䟦子久云展視之時有一大星貫斗而墜其聲如雷宋本余已摹取刻石吳本多枯筆别自一種米書然皆真蹟也米賦材乃强弩之末而子瞻稱其寳月賦以為知元章不盡乃曾無一本傳世何也因背臨及之臨懷素帖書尾懷素自叙帖真蹟嘉興項氏以六百金購之朱錦衣家朱得之内府蓋嚴分宜物沒入大内後給侯伯為月俸朱太尉希孝旋收之其初吳郡陸完所藏也文待詔曽摹刻停雲館行于世余二十年前在檇李獲見真本年來亦屢得懷素它草書鑒賞之唯此為最本朝學素書者鮮得宗趣徐武功祝京兆張南安莫方伯各有所入豐考功亦得一斑然狂恠怒張失其本矣余謂張旭之有懷素猶董源之有巨然衣鉢相承無復餘恨皆以平淡天真為㫖人目之為狂乃不狂也久不作草今日臨文氏石本因識之自書卷後此余壬辰北上時在廣陵舟中書也丙申除夕清臣復持至齋中余重展之因念古人書與年俱老今去壬辰又五年矣無能多勝于曩時深以為媿酣古齋帖䟦余見懷素一帖云少室中有神人藏書蔡中郎得之古之成書者欲後天地而出其持重如此今人朝學執筆夕已勒石余深鄙之清臣以所藏余書一一摹勒具見結集苦心此猶率意筆遂為行世予甚懼也雖然予學書三十年不敢謂入古三昧而書法至余亦復一變世有明眼人必能知其解者為書各種以副清臣之請書大江東詞題尾余以丙申秋奉使長沙浮江歸道出齊安時余門下徐暘華為黄岡令請余大書東坡此辭曰且勒之赤壁余乗利風解纜後作小赤壁詩為吾松赤壁解嘲既而余兩被朝命皆在黄武間覽古懷賢知當日坡公舊題詩處也因書詞識之題卷後醉後磨墨一斗以三文頭雞毛筆書此篇迅疾如追風逐電略無凝滯皆自顔尚書米漫士書法得來書家當有知者臨懷素真蹟䟦後藏真書余所見有枯笋帖食魚帖天姥唫冬熱帖皆真蹟以澹古為宗徒求之豪宕竒恠者皆不具魯男子見者也顔平原云張長史雖天姿超逸妙絶古今而楷法精詳特為真正吁此素師之衣鉢學書者請以一瓣香供養之書荆公詞題尾王介甫金陵懷古詞東坡于壁上觀之歎曰此老狐精也其推服若此米元章又稱荆公書絶似五代楊少師蘇之詞米之書皆横絶千古獨不敢傲介甫此公若不作宰相豈至掩其長邪臨稧帖題後蘭亭敘最重行間章法余臨書乃與原本有異知為聚訟家所訶然陶九成載稧帖考尚有以草體當之者政不必規規相襲今人去古日逺豈在行段乎又趙文敏臨稧帖無慮數百本即余所見亦至夥矣余所臨生平不能終篇然使如文敏多書或有入處蓋文敏猶帶本家筆法學不純師余則欲絶肖此為異耳書自敘帖題後米元章書多從禇登善悟入登善深于蘭亭為唐賢秀頴第一此本蓋其衣鉢也摹授清臣清臣其寳之余素臨懷素自叙帖皆以大令筆意求之時有似者近來解大紳豐考功狂恠怒張絶去此血脉遂累及素師所謂從門入者不是家珍見過于師方堪傳授也書後赤壁賦䟦余三見子瞻自書赤壁賦一在檇李黄承𤣥家一在江西楊寅秋家一在楚中何宇度家皆從都下借臨黄卷有子瞻䟦尤勝然皆前賦也後赤壁則惟趙子昻有石本又思陵嘗書之夏禹玉為補圖亦在楊寅秋家因書後赤壁賦并記于此書陶詩䟦後陶靖節詩儲光羲之源委也韋司直亦其耳孫乎東坡和陶雖極力摹擬然禪家所謂夾帶有之矣東坡像太白淵明皆相似書小楷册題後小楷書乃致難自臨帖者只在形骸去之益逺當由未見古人真蹟自隔神化耳宋時唯米芾有解至今如阿閦一見也書雪賦題後客有持趙文敏書雪賦見示者余愛其筆法遒麗有黄庭樂毅論風規未知後人誰為競爽恐文徴仲瞠乎若後矣遂自書一篇意欲與異趣令人望而知為吾家書也昔人云非惟恨吾不見古人亦恨古人不見吾又云右軍無臣法此則余何敢言然世必有解之者書各體卷題後此余在長安呵凍手書及還山舟中待放閘消遣永晝者清臣為沃而裝池及自披之頗似五技窮䑕耳若曰徇知之合則吾豈敢臨四家尺牘䟦尾余嘗臨米襄陽書于蔡忠惠黄山谷趙文敏非所好也今日展法帖各臨尺牘一篇頗亦相似又及蘇文忠示予所習也元人作書經以蘇文忠趙文敏為得二王法不及米澷士其持論如此未省所謂臨栁稧帖題桞誠懸書蘭亭不落右軍蘭亭叙筆墨蹊逕古人有此眼目故能名家書雪浪齋銘題後山谷論人家子弟可百不能唯俗便不可醫子瞻自是千載人觀其與李伯時王定國諸公會賞翰墨自謂薄富貴而厚于書輕死生而重于畫即雪浪以百二十千購之所至故無一椽也元龍百尺樓下物政當愧死何置喙哉補龍井記書後秦太虚撰龍井記直稱蘓家勝友元章此碑絶得李栝州三昧惜多殘缺余為補之然聞趙吳興曾欲補米書數行一再易之皆不相似曰今人去古逺矣則余其有續貂之愧也夫臨顔帖䟦余近來臨顔書因悟所謂折釵股屋漏痕者惟二王有之魯公直入山隂之室絶去歐褚輕媚習氣東坡云詩至于子美書至于魯公非虚語也顔書惟蔡明逺序尤為沉古米海岳一生不能彷彿蓋亦為學唐初諸公書稍乏骨氣耳燈下為此都不對帖雖不至入俗第神采璀璨即是不及古人處漸老漸熟乃造平淡米老猶隔塵敢自許逼真乎題以志吾愧又臨顔太師明逺帖五百本後方有少分相應米元章趙子昻止撮其勝㑹遂在門外如化城鹿車未了事耳臨十三行䟦此韓宗伯家藏子敬洛神十三行真跡予以閏三月十一日登舟以初八日借臨是日也友人攜酒過余旅舍者甚多余以琴棋諸品分曹欵之因得閒身倣此帖既成具得其肉所乏神采亦不足異也又文氏二王帖有洛神賦稱為子敬非也此李龍眠書宣和譜所云出入魏晉不虚耳又龍眠摹古則用絹素洛神卷是絹本或唐人書李臨倣之乃爾遒雋耶要須以十三行帖稱量之書月賦後小楷書不易工米元章亦但有行押嘗被命倣黄庭作千文一本以進今觀其跡但以妍媚飛動取態耳邢子愿謂余曰右軍以後惟趙吳興得正衣鉢唐宋皆不如也蓋謂楷書得黄庭樂毅論法吳興為多要亦有刻畫處余稍及吳興而出入子敬同能不如獨勝余于吳興是也又余少時為小楷刻畫世所傳黄庭經東方賛後見晉唐人真蹟乃知古人用筆之妙殊非石本所能傳既折𠂻王子敬顧愷之自成一家因觀昔年書月賦澷題臨楊少師帖䟦後楊少師歩虚詞帖即米老家藏大仙帖也其書鶱翥簡澹一洗唐朝姿媚之習宋四大家皆出于此余每臨之亦得一斑題禮觀音文余書此文意欲儗虞永興歐陽率更自愧無出藍之能耳趙吳興云永興書唯枕卧帖清峭有晉人韻使余得見之書道必不止此臨顔書題後顔平原争坐帖與祭季明文唐時林藻師之楊景度蔡端明皆具有一體余此書頗似類顔具眼者謂何又右顔平原書絳州帖所刻蓋師陶貞白瘞鶴銘小異平日學右軍書者黄魯直宗之題自書古詩卷尾今日臨古詩數首俱不入晉人室唯顔平原虞永興楊少師三家差不愧耳時乙巳正月十九日為余懸弧辰也題争坐位帖後争坐位帖宋蘓黄米蔡四家書皆仿之唐時歐虞禇薛諸家雖刻畫二王不無拘于法度惟魯公天真爛漫姿態横出深得右軍靈和之致故為宋一代書家淵源余以陜本漫漶乃摹此宋搨精好者刻之戱鴻堂中臨褚遂良西昇經䟦褚遂良西昇經與淳熈秘閣續帖所刻黄庭經同一筆法真跡昔藏新都殷尚書家余在長安曾于殷叅軍見之永嘉王中舍為吳太學手摹一本不差毫髪後歸武林洪黄門黄門以余寫法華經字形相等遂以贈余且曰子臨百本使馬骨追風畫龍行雨以一本見酬余茫然未知何時得慰其意臨王右軍曺娥碑䟦余為庶常時館師韓宗伯出所藏曹娥碑真跡絹本示余乃宋徳夀殿題元文宗命柯九思鑒定書畫賜以此卷趙孟頫䟦記其事甚詳且云見此如岳陽樓親聴仙人吹笛可以權衡天下之書矣當時以館師嚴重不敢借摹亦渝敝難摹略可彷彿于非烟非霧間耳因書曺娥碑識之臨内景黄庭䟦内景經全在筆墨畦逕之外其為六朝人得意書無疑今人作書只信筆為波畫耳結搆縱有古法未嘗真用筆也善用筆者清勁不善用筆者濃濁不獨連篇各體有分别一字中亦具此兩種不可不知也臨稧帖䟦後余書蘭亭皆以意背臨未嘗對古刻一似撫無絃琴者覺尤延之諸君子葛藤多事耳臨楊少師書後余以意倣楊少師書山陽此論雖不盡似略得其破方為圓削繁為簡之意蓋與趙集賢書如甘草甘遂之相反亦教外别傳也書養生論䟦後東坡先生數書嵇叔夜養生論憂患之餘有意于道言如此它日又曰長生未能學且學長不死洪覺範妙喜禪師謂其多生般若種子深固又進于所謂養生者要以忠孝文章節義如公升天成佛俱是探囊取物其八識田中自具兩家種子循業發現不學而能也因書此論及之臨趙松雪書䟦後婁水王奉常家藏趙吳興詩帖致佳余從高仲舉見之把玩移日舟行閒適漫臨一過余素不為吳興書略得形模耳聞吳興臨米元章壯懷賦數行輒復自廢除以俟它人覆醬瓿也書琵琶行題後白香山深于禪理以無心道人作此有情癡語幾所謂木人見花鳥者耶山谷為小詞而秀鐡訶之謂不止落驢胎馬腹則慧業綺語猶當懴悔耳余書此歌用米襄陽楷法兼撥鐙意欲與艶詞相稱乃安得大珠小珠落研池也書别賦題後陸魯望詩云丈夫非無淚不灑離别間仗劍對尊酒恥為㳺子顔蓋反文通此賦如子雲反騷惜江令少此一轉耳義陽吳光禄丞徹如寄褚登善千文示余披賞數日風雨如晦泓頴久廢朝來始見霽色偶然欲書為竟此卷觀者必訝謂余本家筆安在也書古尺牘題後行書十行不敵楷書一行米南宫語也時一為之以斂浮氣竟此紙凢十起對客信乎孫䖍禮所云神怡務閒之難也書圓通偈後以虞伯施廟堂碑法書此偈貞觀時楞嚴猶未經翻譯永興破邪論亦世諦流布耳顔魯公頗事道言李北海但作碑板懷素著袈裟犯飲酒戒草書狂縱不足與寫經手校量功徳唐世書學甚盛皆不為釋所用梁肅房融其書不稱惟裴休深于内典兼臨池之能淳熈帖所刻是已至宋蘇黄兩公大以翰墨為佛事宋人書不及唐其深心般若故當勝也余蚤歳習耳根圓通每書之幾所謂一舉一囘新者臨坐位帖題後新都汪太學孺仲以宋搨争坐位帖見示神采奕奕字形較陜刻差肥余臨寫之次時有訛字乃知是米海岳所臨米嘗自記有臨争坐帖在浙中此殆其真跡入石者耶題楷書雪賦後楷書以智永千文為宗極虞永興其一變耳文徵仲學千文得其姿媚予以虞書入永書為此一家筆法若退頴滿五簏未必不合符前人顧經歳不能成千字卷册何稱習者之門自分與此道逺矣臨鍾紹京書䟦後右唐鍾紹京書通甲神經有宣和政和小璽宋徽宗標識倪元鎮家藏有元鎮䟦語筆法精妙迴腕藏鋒得子敬神髓趙文敏正書實祖之余從真跡臨寫數行鍾書世無傳本自此可以意求耳臨虞永興書䟦後虞永興常自謂于道字有悟蓋于發筆處出鋒如抽刀斷水正與顔太師錐畫沙屋漏㾗同趣前人巧處故應不傳學虞者輒成算子筆陣所訶以此余非能書能解之耳臨海岳千文䟦後米海岳行書傳于世間與晉人幾争道馳矣顧其平生所自負者為小楷貴重不肯多寫以故罕見其跡予㳺京師曾得鑒李伯時西園雅集圖有米南宫蝇頭題䟦最似蘭亭筆法己丑四月又從唐完初獲借此千文臨成副本稍具優孟衣冠大都海岳此帖全倣褚河南哀册枯樹賦間入歐陽率更不使一實筆所謂無徃不收蓋曲盡其趣恐真本既與余逺便欲忘其書意聊識之于紙尾此余己丑所臨也今又十年所矣筆法似昔未有增長不知何年得入古人之室展卷太息不止書道也戊戌四月三日臨十七帖書後十七帖硬黄本宋時魏泰家藏淳熈秘閣續帖亦有刻予在都下友人汝陽王思延得硬黄本曾借臨一卷已于濟南邢子愿冏卿見所刻石即王本也余以臨卷質之子愿謬稱合作苐謂趙吳興臨十七帖流落人間當不下數十本請多為之足傳耳余自是時寫此帖以懶故終不能多也臨洛神賦書後樂毅論乃扇書後人又以為右軍自書刻石梁世所摹與唐摹字形各異淳熈秘閣梁摹本也予家戲鴻堂帖唐摹本也又有一本唐摹在長安李氏曾屬余䟦亦有文夀承䟦蓋貞觀中太宗命褚遂良等摹六本賜魏徴諸臣此六本自唐至今余猶及見其二恨梁摹白麻紙真跡為新都吳生所有余亦不甚臨樂毅論每以大令十三行洛神賦為宗極耳臨像賛題後栁誠懸小書𤣥真䕶命經不知其所自因臨畫像讃知誠懸用其筆意小加勁耳唐人書無不出于二王但能脱去臨倣之迹故稱名家世人但學蘭亭面誰得其皮與其骨凡臨書者不可不知此語䟦臨女史箴昔年見晉人畫女史箴云是虎頭筆分類題箴附于畫左方則大令書也大令書女史箴不聞所自據孫過庭書譜有云右軍太師箴豈即女史而訛承于後耶然其字結體全類十三行則又非王右軍也暇日適發興欲書遂復倣不見真跡聊以意取乃不似耳臨宣示表題後鍾太傅書余少而學之頗得形模後得從韓館師借唐搨戎輅表臨寫始知鍾書自有入路蓋猶近𨽻體不至如右軍以還姿態横溢極鳯翥鸞翔之變也閣帖所收惟宣示表還示帖皆右軍之鍾書非元常之鍾書但觀王世將宋儋諸跡有其意矣辛丑冬因臨宣示表及之䟦臨瘞鶴銘黄涪翁云大字無過瘞鶴銘小字無過遺教經今世所傳遺教直唐經生手耳瘞鶴則陶隱居書山谷學之余欲縮為小楷偶失此帖遂以黄庭筆法書之書舞鶴賦後徃余以黄庭樂毅真書為人作膀署書每懸看輒不得佳因悟小楷法使可展為方丈者乃盡勢也題牓如細書亦跌宕自在惟米襄陽近之襄陽少時不能自立家專事摹帖人謂之集古字已有規之者曰須得勢乃傳正謂此因書舞鶴賦及之䟦十三行洛神賦趙文敏得宋思陵十三行于陳灝蓋賈似道所購先九行後四行以悦生印款之此子敬真跡至我朝惟存唐摹耳無論神采即形模已不相似惟晉陵唐太常家藏宋搨為當今苐一曾一見于長安臨寫刻石恨趙吳興有此墨跡未盡其趣蓋吳興所少正洛神䟽雋之法使我得之政當不啻也題書千字文後千文凢書四載先後作止筆墨間闊幾如寫一大藏經今至延津始成之山中自恃多暇乃至不如吏牘之餘予所愧于嵇叔夜也題歸去來辭後以米元章筆法書淵明辭差為近之臨米書後是日海上顧氏以米襄陽真跡見示余為臨此大都米家書與趙吳興各為一門庭吳興臨米輒不能似有以也吳興書易學米書不易學二公書品于此辨矣書飲中八仙歌後陸士衡作竹林七賢論以嵇阮為標顔延之作五君詠王濬沖山巨源皆在門外弗復及少陵八仙歌其尤著者賀季真太白耳他日作八哀詩于飲中八仙獨著汝陽王所謂虬鬚似太宗色暎塞外春者豈讓帝之子負竒自廢韜光剷采醉鄉為隱者耶即諸子當非酒人可概矣䟦稧帖後唐相褚河南臨稧帖白麻跡一卷曾入元文宗御府有天厯之寳及宣政紹興諸小璽宋景濓小楷題䟦吾鄉張東海先生觀于楊氏之衍澤樓蓋雲間世家所藏也筆法飛舞神采奕奕可想見右軍真本風流實為希代之寳余得之吳太學每以勝日展玩輙為心開至于手臨不一二卷止矣苦其難合也昔章子厚日臨蘭亭一卷東坡聞之以為從門入者不是家珍東坡學書宗㫖如此趙文敏臨稧帖最多猶不至如宋之紛紛聚訟直以筆勝口耳所謂善易者不談易也臨官奴帖真蹟此帖在淳熈秘閣續刻米元章所謂絶似蘭亭叙昔年見之南都曾記其筆法于米帖曰字字騫翥勢竒而反正藏鋒裹鐡遒勁蕭逺庶幾為之傳神已聞為海上潘方伯所得又復歸王元美王以貽余座師新安許文穆公文穆傳之少子胄君一武弁借觀因轉售之今為吳太學用卿所藏頃于吳門出示余快余二十餘年積想遂臨此本云抑余二十餘年時書此帖茲對真跡豁然有㑹蓋漸修頓證非一朝夕假令當時力能致之不經苦心懸念未必契真懷素有言豁焉心胷頓釋凝滯今日之謂也時戊申十月十有三日舟行朱涇道中日書蘭亭及此帖一過以官奴筆意書稧帖尤為得門而入評舊帖題絳帖一卷後宋搨絳州帖乃官奴嫡冢故佳本在汝帖長沙之上昔人得古帖數行專心學之遂以名世况此本已具各體即不完善比之威鳯一毛可藏也題娑羅樹碑後保母帖辭中令帖大令實為北海之濫觴今人知學北海而不追踪大令是以佻而無簡直而少致北海曰似我者俗學我者死不虚也趙吳興猶不免此况餘子哉黄庭經䟦黄庭經以師古齋刻為第一乃遂良所臨也淳熈續帖亦有之書稧帖後此本發筆處是唐人口口相授筆訣也米海岳深得其意舟過崇徳縣觀題稧帖黄庭各帖後蘭亭無下本此刻當是唐人鈎摹其黄庭吾不甚好頗覺其俗告墓表集智永千文而成之宣示表轉刻已多既失其渾宕之氣聊存形似後之學者當以意㑹之可也題雲麾將軍碑此碑文多不全獨此刻前後讀之皆有倫次當是石未泐時拓本殊可寳藏歐陽金石録每有不以書家見收者况北海為書中仙乎題潁上稧帖後潁上縣有井夜放白光如虹亘天縣令異之乃令人探井中得一石六銅罍其石所刻黄庭經蘭亭叙皆宋搨也余得此本以較各帖所刻皆在其下當是米南宫所摹入石者其筆法頗似耳題洛神違逺各帖後大令洛神賦多集後人筆意豈元人趙松雪為之耶違逺帖告墓之流與辭中令書皆子敬得意筆也辭中令帖是李邕淵源其為子敬筆無疑題羣玉堂帖羣玉堂帖所載虞世南天馬賛乃栁子厚文荆門行見李羣玉集非李栝州也詩亦不類開元及栁公權詩皆謬豈集字為之耶題獻之帖後大令辭中令帖評書家不甚及或出于米元章黄長睿之後耳觀其運筆則所謂鳯翥鸞翔似竒反正者深為漏洩家風必非唐以後諸人所能夢見也李北海似得其意書黄庭經後吳用卿得此余乍展三四行即定為唐人臨右軍既閱竟中間于淵字皆有缺筆蓋高祖諱淵故虞褚諸公不敢觸耳小字難于寛展而有餘又以蕭散古淡為貴顧世人知者絶少能于此卷細參當知吾言不謬也評子敬蘭亭帖此卷用筆蕭散而字形與筆法一正一偏所謂右軍書如鳯翥鸞翔跡似奇而反正邇來學黄庭經聖教序者不得其解遂成一種俗書彼倚藉古人自謂合轍襍毒入心如油入麪帶累前代諸公不少余故為拈出使知書家自有正法眼藏也又余觀二王真跡十餘帖矣獨此卷心眼相印自許不惑又須知永興書法從此發源也題王珣真蹟米南宫謂右軍帖十不敵大令跡一余謂二王跡世猶有存者唯王謝諸賢筆尤為希覯亦如子敬之于逸少耳此王珣書瀟洒古淡東晉風流宛然在眼用卿得此可遂作寳晉齋矣虞伯施積時帖此卷或疑米臨然其研筆處特為瘦勁米書以態勝不辦此也王元美家有虞永興汝南公主墓志客亦有謂米臨者元美自題曰果爾則賈王得羊於願足矣此帖則當出其右具眼者自能識取題評紙帖為朱敬韜米元章評紙如陸羽品泉各極其致而筆法都從顔平原幻出與吾友王宇泰所藏天馬賦同是一種書臨寫彌月仍歸用卿用卿其寳之孫䖍禮千文䟦此孫過庭真蹟也觀其結字猶存漢魏間法蓋得之章草為多即永師千文亦爾乃知作楷書必自八分大篆入門沿流討源見過于師方堪傳授學過庭者又自右軍求之可也題范牧之稧帖牧之書蘭亭叙筆勢遒媚以姿態勝韻自喜宋仁卿裝之屏角十餘年時象先尚髫齔未及收去茲乃念手澤復從仁卿請回此卷昔右軍書不為諸子所寳惜右軍每有家雞野鶩之嘆牧之書固自古雅而象先即善書何忍人稱過父也題朱敬韜所藏趙榮禄鮮于伯機真蹟吳興書少有師褚登善者此前二幅似之又所報燕京竒畫是孫過庭法也鮮于伯機評書天真爛漫盡力與吳興敵者是皆可傳也今日過敬韜出此相視因借歸摹之戲鴻堂帖中䟦智永帖此永師倣鍾元常宣示表每用筆必曲折其筆宛轉囬向沉着收束所謂當其下筆欲透過紙背者唐以後此法漸澌盡矣題徐道寅手書諸經後真如不變千佛即一不變隨縁一佛而千古佛所以有云佛之一字吾不喜聞也雖然地藏經云人命終時聞一佛名號一辟支佛名號皆得免苦當四大分散神識分飛一佛名號俱不能記憶自非平生串習安能于爾時得力所謂一句染神厯刼不易徐居士道寅所以書寫受持念誦此千佛名經也唐以曲江題名為千佛名經宋人以元祐黨碑為千佛名經道寅以千佛名經為千佛名經是同是别䟦趙子昻書過秦論吳興此書學黄庭内景經時年三十八歳最為善者機也成名以後隤然自放亦小有習氣于是贋書亂之鈍滯吳興不少矣䟦張旭草書項𤣥度出示謝客真蹟余乍展卷即命為張旭卷末有豐考功持謝書甚堅余謂𤣥度曰四聲定于沈約狂草始于伯高謝客時都無是也且東明二詩乃庾開府歩虛詞謝安得預書之乎𤣥度曰此陶𢎞景所謂元常老骨更蒙榮造者矣遂為改䟦䟦率更千文書家以分行布白謂之九宫元人作書經云黄庭有六分九宫曹娥有四分九宫今觀信本千文真有完字具于胸中若構凌雲臺一一皆衡劑而成者米南宫評其真書到内史信矣此本傳為信本真蹟予較之乃廓填之最精者所謂下真蹟一等耳䟦東坡書後東坡先生居黄自謂多難畏事時猶禁其詩耳後復并其書禁之故宣和進御書畫凡有蘓黄題䟦者皆割去靖康之變御府所藏盡為金人輦之而北而先生墨跡流落人間者居然獨完誰謂善類竟可磨滅耶䟦吳傅朋書昔人稱吳傅朋説真書為宋朝第一今觀九歌應䂓入矩深得蘭亭洛神遺意高宗洞精書法至為閣筆歎賞不虚也左方有馬和之侍郎圖此必當時有李伯時畫九歌米元章作書而二公復倣之耳伯時書乃全用鍾法宣和譜謂其追蹤魏晉今始見之當與米元章並傳者宋之小楷名家盡此矣䟦赤壁賦後坡公書多偃筆亦是一病此赤壁賦庶幾所謂欲透紙背者乃全用正鋒是坡公之蘭亭也真跡在王履善家每波畫盡處隱隱有聚墨㾗如黍米珠恨非石刻所能傳耳嗟乎世人且不知有筆法况墨法乎題懷仁聖教序真跡古人摹書用硬黄自運用絹素此卷首有宋徽宗金書縹字與内景經同一黄素知為懷仁一筆自書無疑書苑所云雜取碑字右軍劇迹咸萃其中非也黄長睿書家董狐亦以書苑為據恨其不見真蹟輙隨人言下轉耳又此書視陜本特為姿媚唐時稱為小王書若非懷仁自運即不當命之小王也吾家有宋舍利塔碑云習王右軍書集之為習正合余因此自信有㑹䟦魯公送劉太冲敘顔魯公送劉太冲叙鬱屈瑰竒于二王法外别有異趣米元章謂如龍蛇生動見者目驚不虚也宋四家書𣲖皆出魯公亦只爭坐帖一種耳未有學此叙者豈當時不甚流傳耶真跡在長安趙中舍士楨家以余借摹遂為好事者購去余凢一再見不復見矣淳熈秘閣續帖亦有刻題大令洛神十三行真跡趙吳興曾得洛神十三行于陳集賢灝自題此晉時麻箋思陵極力捜訪僅獲九行百七十六字故米友仁䟦作九行宋末賈似道復得四行七十四字欲續于後則于九行之䟦不相屬遂以四行别裝于後以悦生印及長字印欵之今此本不知猶在人間不余所摹秀州項子京藏是宣和譜中所收吳興云更有唐人臨本後有桞公權䟦亦神物也視世所傳十三行宋搨何啻霄壤耶䟦鹿脯帖後鹿脯帖真跡與宋搨本不唯字形大小不倫乃其文亦小異宋搨政自不足據也十七帖清晏歳豐又所使有豐一鄉故自名處予極不解豐一鄉作何語及得高麗刻本乃云所出有異産讀之豁然因知王著但慿倣書入石耳䟦楊義和黄庭經後黄素黄庭經陶穀䟦以為右軍換鵞書米芾䟦以為六朝人書無虞禇習氣惟趙孟頫以為飄飄有仙氣乃楊許舊迹而張雨題吳興過秦論直以為學楊義和書吳興精鑒必有所據非臆語也按真誥稱楊書祖效郗法力同二王述書賦亦云方圓自我結搆遺名如舟楫之不繫混寵辱以若驚其為書家所重若此顧唐時止存草書六行今此經行楷數千字神采奕然傳流有緒豈非墨池竒遘耶元時在鮮于樞家余昔從館師韓宗伯借摹數行茲勒以冠諸帖楊在右軍後以是神仙之跡不復係以時代耳䟦吳雲壑書後吳琚書自米南宫外一歩不窺京口北固山有天下第一江山牓書即其筆也始于都下見七言絶一幅不欵名姓但有雲壑居士印偶閱宋經籍志雲壑集吳琚撰知為琚書已于新安白岳下山客持晦翁書歸去來辭迺絶似米元章後有雲壑二字因得審定今藏于家此詩沒于焦山江中潤州守霍君為余拓墨本然已在若明若晦間不可臨摹矣題温飛卿書湖陰曲温飛卿書似平原書而遒媚有態米元章從此入門昔年殷司馬之孫持至長安留予案上兩月余以温庭筠温字頗漫疑是王黄華書黄華亦名庭筠字跡近米家父子故耳川中黄昭素乃謂此必曾入梁内府梁諱温字遂磨去意或有之䟦李北海縉雲三帖黄長睿評張從申書出于北海趙子固又以北海學子敬病在欹側若張從申即無此矣然從申書實似北海之法華寺碑而北海出奇不窮故嘗勝云余嘗謂右軍如龍北海如象世必有肯予言者䟦李伯時書米海岳云少時未能立家但規摹法帖謂之集古字今觀九歌良然左方有伯時畫畫史所稱與伯時經營九歌者是已伯時孝經力追鍾法宣和譜謂書逼魏晉不虛耳二帖皆節文書度人經後余曾見桞誠懸小楷度人經遒勁有致蔡君謨茶録頗倣之世未有傳者此清靜經似永興破邪論海上潘氏所藏宋帖也䟦索靖出師頌鍾太傅書自晉渡江時止傳宣示表百餘年間妙跡已絶寜知今世有索靖出師頌耶此本在檇李項子京家故是甲觀䟦子敬帖寳晉帖刻此帖大軍止余撿子敬别帖自已至至末辭意相屬原是一帖為收藏者離去耳二王書有不可讀者皆此類也米元章故以此為子敬第一書䟦謝莊詩後謝莊詩帖于新都汪景醇得摹本未見真蹟書法似閣帖所謂蕭子雲者而小加妍雋宋高宗書近之題張長史真書長史郎官壁記世無别本唯王奉常敬美有之陳仲醇摹以寄余知學草必自真入也䟦稧帖小本定武稧帖唯賈秋壑所藏至百餘種令其客廖瑩中縮為小本或云唐時褚河南已有之此本余己丑所書亦從館師韓宗伯借褚摹縮為蝇頭體苐非定武本耳畫禪室隨筆卷一
