body:
  text: 畫禪室隨筆目録雜家類三雜説之屬卷一論用筆評法書跋自書評古帖卷二畫訣畫源題自畫評舊畫卷三記事記遊評詩評文卷四雜言上雜言下楚中隨筆禪悅臣等謹案畫禪室隨筆四卷明董其昌撰其昌字元宰松江華亭人萬厯己丑進士改庶吉士官至禮部尚書掌詹事府事加太子太保致仕卒諡文敏事迹具明史文苑傳其昌天才俊逸以書畫擅名人擬之米芾趙孟俯此乃所作雜記其第一卷皆論書語第二卷皆論畫語類多手迹題跋之文而後人為編次成帙者凡所評隲頗得書畫三昧蓋於此道解悟甚深故談言微中洵足為藝事指南之助第三卷分記事記逰評詩評文四子部中如記楊成以蔡經為蔡京之類頗涉輕薄以陸龜蒙白蓮詩為皮日休未免舛誤又其昌於八股最有法度故評文多談制藝亦自舉其所得力者言之然大致雅馴實有可採第四卷亦分子部四雜言上下皆小品間文楚中隨筆則册封楚王時所作並足以資檢核惟禪悅一門托拾宗門餘唾推重李贄陶望齡諸人殊為漸染習氣然當時士大夫大槩皆然固不足為其昌責矣乾隆四十三年八月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:f328f164a9545a71ce5127bc146a3f7b0d5890374bf1481fa735da2aaac1c469
